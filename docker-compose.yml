version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qld-train-backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/logs          # backend writes logs to host folder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - trainnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qld-train-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./logs:/var/log/traintracker:ro   # frontend reads logs from host folder
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trainnet

networks:
  trainnet:
    driver: bridge
