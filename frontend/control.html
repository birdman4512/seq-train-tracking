<style>

<div class="body">

<script>
// ─────────────────────────────────────────────────────────────────────────────
// BASE URL — works at root or any subfolder
// ─────────────────────────────────────────────────────────────────────────────
// API_BASE: works at root, subfolders, with or without trailing slash
// Treats the current page URL as a folder (even if no trailing slash)
// so fetch(API_BASE+'/vehicles') always resolves correctly.
const API_BASE = (()=>{
  let path = location.pathname;
  // If path has no trailing slash and no file extension, treat it as a directory
  if (!path.endsWith('/') && !path.split('/').pop().includes('.')) path += '/';
  // Get directory portion
  const dir = path.substring(0, path.lastIndexOf('/') + 1);
  return location.origin + dir + 'api';
})();
document.getElementById('mapbtn').onclick = () => location.href = API_BASE.replace(/\/api$/, '/');

// ─────────────────────────────────────────────────────────────────────────────
// COLOURS
// ─────────────────────────────────────────────────────────────────────────────
const RMAP = {};
const CRULES = [
  {k:'SH',c:'#00aeef'},{k:'SP',c:'#1c63b7'},{k:'VL',c:'#f5a400'},
  {k:'RW',c:'#f47920'},{k:'FG',c:'#e3000f'},{k:'DO',c:'#e0007f'},
  {k:'AP',c:'#6b21a8'},{k:'CL',c:'#ffd600'},{k:'BE',c:'#6fbe44'},
  {k:'CA',c:'#7b2d8b'},{k:'NA',c:'#7b2d8b'},{k:'KP',c:'#00b5cc'},
  {k:'IP',c:'#f47920'},{k:'RP',c:'#00b5cc'},{k:'IM',c:'#6fbe44'},
];
function lc(rid){
  if(!rid)return'#5a6478';
  if(RMAP[rid])return RMAP[rid];
  const u=rid.toUpperCase();
  for(const{k,c}of CRULES)if(u.includes(k))return c;
  return'#7a8899';
}
async function loadColours(){
  const retry=async()=>{
    try{
      const[r1,r2]=await Promise.all([fetch(API_BASE+'/debug/routes'),fetch(API_BASE+'/debug/live')]);
      const[d1,d2]=await Promise.all([r1.json(),r2.json()]);
      let n=0;
      for(const rt of(d1.gtfs_routes||[])){const c=rt.gtfs_color||rt.computed_colour;if(c&&c!=='#5bb8ff'){RMAP[rt.route_id]=c;n++;}}
      for(const rt of(d2.live_route_ids||[])){const c=rt.gtfs_colour||rt.computed_colour;if(c&&c!=='#5bb8ff')RMAP[rt.route_id]=c;}
      if(!n)setTimeout(retry,5000);
    }catch{setTimeout(retry,6000);}
  };retry();
}

// ─────────────────────────────────────────────────────────────────────────────
// SCHEMATIC DEFINITION
//
// The network is a tree of TRACK SEGMENTS.
// Each segment has:
//   - stops[]  : ordered station names
//   - col      : colour (or array of colours if multiple lines share it)
//   - children : branches that peel off at the LAST stop of this segment
//
// Roma Street is the root. The diagram fans out left and right from it.
// ─────────────────────────────────────────────────────────────────────────────

// Colours
const C = {
  CAB:'#7b2d8b', KCL:'#00b5cc', SHO:'#00aeef', AIR:'#6b21a8',
  DOO:'#e0007f', FER:'#e3000f', BEL:'#6fbe44', GOL:'#f5a400',
  CLV:'#ffd600', IPL:'#f47920', SPR:'#1c63b7',
};

// Utility: blend two hex colours
function blend(a,b){
  const p=v=>parseInt(v,16);
  const r1=p(a.slice(1,3)),g1=p(a.slice(3,5)),b1=p(a.slice(5,7));
  const r2=p(b.slice(1,3)),g2=p(b.slice(3,5)),b2=p(b.slice(5,7));
  return`#${Math.round((r1+r2)/2).toString(16).padStart(2,'0')}${Math.round((g1+g2)/2).toString(16).padStart(2,'0')}${Math.round((b1+b2)/2).toString(16).padStart(2,'0')}`;
}

//
// TREE DEFINITION
// Each node: { stops, cols, children }
// stops: station names along this segment
// cols: array of line colours (drawn as parallel stripes if >1)
// children: array of child segments that branch from the last stop
// dx,dy: direction hint — which way the first stop steps relative to the branch point
//   dx=1 means east (+x), dy=-1 means north (-y), etc.
//
const TREE = {
  stops: ['Roma Street'],
  cols:  [C.CAB,C.KCL,C.SHO,C.AIR,C.DOO,C.FER,C.BEL,C.GOL,C.CLV,C.IPL,C.SPR],
  children: [
    // ── RIGHT (east) branch: City → Northgate corridor ───────────────────
    {
      dx:1, dy:0,
      stops: ['Central','Fortitude Valley','Bowen Hills'],
      cols:  [C.CAB,C.KCL,C.SHO,C.AIR,C.DOO,C.FER],
      children: [
        // Ferny Grove peels off north at Bowen Hills
        {
          dx:1, dy:-1,
          stops: ['Windsor','Wilston','Newmarket','Alderley','Enoggera','Gaythorne','Mitchelton','Oxford Park','Grovely','Keperra','Ferny Grove'],
          cols:  [C.FER],
          children: []
        },
        // Main corridor continues east
        {
          dx:1, dy:0,
          stops: ['Eagle Junction'],
          cols:  [C.CAB,C.KCL,C.SHO,C.AIR,C.DOO],
          children: [
            // Shorncliffe+Airport peel off north at Eagle Junction
            {
              dx:1, dy:-1,
              stops: ['Wooloowin','Albion'],
              cols:  [C.SHO,C.AIR],
              children: [
                // Shorncliffe continues northeast
                {
                  dx:1, dy:-1,
                  stops: ['Bindha','Banyo','Nudgee','Boondall','North Boondall','Deagon','Sandgate','Shorncliffe'],
                  cols:  [C.SHO],
                  children: []
                },
                // Airport branches further east
                {
                  dx:1, dy:0,
                  stops: ['Domestic Airport','International Airport'],
                  cols:  [C.AIR],
                  children: []
                }
              ]
            },
            // Doomben peels off north (different slot from SHO)
            {
              dx:1, dy:-2,
              stops: ['Clayfield','Hendra','Ascot','Doomben'],
              cols:  [C.DOO],
              children: []
            },
            // Main corridor continues to Northgate
            {
              dx:1, dy:0,
              stops: ['Northgate','Carseldine','Bald Hills','Strathpine','Lawnton','Petrie'],
              cols:  [C.CAB,C.KCL],
              children: [
                // Caboolture continues straight
                {
                  dx:1, dy:0,
                  stops: ['Narangba','Burpengary','Morayfield','Caboolture','Elimbah','Beerburrum','Glasshouse Mountains','Beerwah','Landsborough','Woombye','Nambour','Gympie North'],
                  cols:  [C.CAB],
                  children: []
                },
                // Kippa-Ring peels off north
                {
                  dx:1, dy:-1,
                  stops: ['Kallangur','Murrumba Downs','Mango Hill','Mango Hill East','Rothwell','Kippa-Ring'],
                  cols:  [C.KCL],
                  children: []
                }
              ]
            }
          ]
        }
      ]
    },
    // ── LEFT (west) branch: South corridor ───────────────────────────────
    {
      dx:-1, dy:1,
      stops: ['South Brisbane','South Bank','Boggo Road'],
      cols:  [C.BEL,C.GOL,C.CLV],
      children: [
        // Cleveland peels south
        {
          dx:-1, dy:2,
          stops: ['Buranda','Coorparoo','Norman Park','Morningside','Cannon Hill','Murarrie','Hemmant','Lindum','Wynnum North','Wynnum','Wynnum Central','Manly','Lota','Thorneside','Birkdale','Wellington Point','Ormiston','Cleveland'],
          cols:  [C.CLV],
          children: []
        },
        // Beenleigh+GC continue west
        {
          dx:-1, dy:1,
          stops: ['Dutton Park','Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury','Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove','Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania','Edens Landing','Holmview','Beenleigh'],
          cols:  [C.BEL,C.GOL],
          children: [
            // Gold Coast continues
            {
              dx:-1, dy:1,
              stops: ['Ormeau','Pimpama','Coomera','Helensvale','Nerang','Robina','Varsity Lakes'],
              cols:  [C.GOL],
              children: []
            }
          ]
        }
      ]
    },
    // ── LEFT (west) branch: Ipswich+Springfield corridor ─────────────────
    {
      dx:-1, dy:3,
      stops: ['Milton','Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra'],
      cols:  [C.IPL,C.SPR],
      children: [
        // Ipswich continues west
        {
          dx:-1, dy:3,
          stops: ['Wacol','Gailes','Goodna','Redbank','Riverview','Dinmore','Bundamba','Booval','Ipswich','Walloon','Rosewood'],
          cols:  [C.IPL],
          children: []
        },
        // Springfield peels south
        {
          dx:-1, dy:4,
          stops: ['Richlands','Springfield','Springfield Central'],
          cols:  [C.SPR],
          children: []
        }
      ]
    }
  ]
};

// ─────────────────────────────────────────────────────────────────────────────
// LAYOUT ENGINE
//
// Walk the tree. Each segment gets pixel coordinates based on its direction
// (dx,dy) and the canvas scale. Roma Street is at pixel (0,0).
//
// Each segment is a horizontal or diagonal line.
// When a segment has children, each child's first stop branches at 45°
// from the parent's last stop.
//
// UNIT = pixels per station (computed from canvas size at build time)
// ─────────────────────────────────────────────────────────────────────────────

let canW=0, canH=0, vp={x:0,y:0,scale:1};
// Computed per node: name→{x,y}
let nodeXY = {};
// Flat list of drawn segments for rendering
let drawSegs = []; // {x1,y1,x2,y2,cols[]}
// For train positioning: lineId → [{name,x,y}]
let linePts  = {};

// LINES for train positioning (full stop lists)
const LINES = [
  {id:'CAB',col:C.CAB,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Northgate','Carseldine','Bald Hills','Strathpine','Lawnton','Petrie','Narangba','Burpengary','Morayfield','Caboolture','Elimbah','Beerburrum','Glasshouse Mountains','Beerwah','Landsborough','Woombye','Nambour','Gympie North']},
  {id:'KCL',col:C.KCL,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Northgate','Carseldine','Bald Hills','Strathpine','Lawnton','Petrie','Kallangur','Murrumba Downs','Mango Hill','Mango Hill East','Rothwell','Kippa-Ring']},
  {id:'SHO',col:C.SHO,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Wooloowin','Albion','Bindha','Banyo','Nudgee','Boondall','North Boondall','Deagon','Sandgate','Shorncliffe']},
  {id:'AIR',col:C.AIR,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Wooloowin','Albion','Domestic Airport','International Airport']},
  {id:'DOO',col:C.DOO,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Clayfield','Hendra','Ascot','Doomben']},
  {id:'FER',col:C.FER,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Windsor','Wilston','Newmarket','Alderley','Enoggera','Gaythorne','Mitchelton','Oxford Park','Grovely','Keperra','Ferny Grove']},
  {id:'BEL',col:C.BEL,stops:['Roma Street','South Brisbane','South Bank','Boggo Road','Dutton Park','Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury','Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove','Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania','Edens Landing','Holmview','Beenleigh']},
  {id:'GOL',col:C.GOL,stops:['Roma Street','South Brisbane','South Bank','Boggo Road','Dutton Park','Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury','Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove','Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania','Edens Landing','Holmview','Beenleigh','Ormeau','Pimpama','Coomera','Helensvale','Nerang','Robina','Varsity Lakes']},
  {id:'CLV',col:C.CLV,stops:['Roma Street','South Brisbane','South Bank','Boggo Road','Buranda','Coorparoo','Norman Park','Morningside','Cannon Hill','Murarrie','Hemmant','Lindum','Wynnum North','Wynnum','Wynnum Central','Manly','Lota','Thorneside','Birkdale','Wellington Point','Ormiston','Cleveland']},
  {id:'IPL',col:C.IPL,stops:['Roma Street','Milton','Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra','Wacol','Gailes','Goodna','Redbank','Riverview','Dinmore','Bundamba','Booval','Ipswich','Walloon','Rosewood']},
  {id:'SPR',col:C.SPR,stops:['Roma Street','Milton','Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra','Richlands','Springfield','Springfield Central']},
];

function buildLayout(W, H) {
  nodeXY = {}; drawSegs = [];
  for(const ln of LINES) linePts[ln.id] = [];

  // Unit size: try to fit the widest branch in the available width
  // The longest horizontal branch is roughly 23 stops east (Roma→Gympie)
  // and 25 stops west (Roma→Varsity). Y has 4 slots.
  // We want UX = W*0.9/48 approx
  const UX = Math.min(W * 0.9 / 50, H * 0.9 / 9);
  const UY = UX;  // equal so 45° angles are true 45°

  nodeXY['Roma Street'] = {x:0, y:0};

  // Walk tree recursively
  walkTree(TREE, 0, 0, UX, UY);

  // Build linePts for train positioning
  for(const ln of LINES){
    linePts[ln.id] = ln.stops.filter(s=>nodeXY[s]).map(s=>({name:s,...nodeXY[s]}));
  }
}

function walkTree(node, px0, py0, UX, UY) {
  // node.stops[0] is already placed at (px0,py0) (or will be placed now)
  const stops = node.stops;
  const dx = node.dx ?? 0;
  const dy = node.dy ?? 0;

  // Place all stops in this segment linearly
  for(let i=0; i<stops.length; i++){
    const nm = stops[i];
    if(!nodeXY[nm]){
      // Linear interpolation along dx,dy direction
      nodeXY[nm] = {x: px0 + dx*i*UX, y: py0 + dy*i*UY};
    }
  }

  // Draw segments between consecutive stops
  for(let i=0; i<stops.length-1; i++){
    const a=nodeXY[stops[i]], b=nodeXY[stops[i+1]];
    if(a&&b) drawSegs.push({x1:a.x,y1:a.y,x2:b.x,y2:b.y,cols:node.cols});
  }

  // Walk children — each child starts at the LAST stop of this segment
  const last = stops[stops.length-1];
  const lp = nodeXY[last];
  if(!lp) return;

  for(const child of (node.children||[])){
    // Child's first stop is at a 45° step from the parent's last stop
    const cdx = child.dx ?? 0;
    const cdy = child.dy ?? 0;
    // The branch point segment: parent_last → child_first (one step diagonal)
    const cfirst = child.stops[0];
    if(!nodeXY[cfirst]){
      nodeXY[cfirst] = {x: lp.x + cdx*UX, y: lp.y + cdy*UY};
    }
    // Draw the branch connection segment
    const cp = nodeXY[cfirst];
    drawSegs.push({x1:lp.x,y1:lp.y,x2:cp.x,y2:cp.y,cols:[...node.cols,...child.cols].filter((c,i,a)=>a.indexOf(c)===i)});
    // Continue walking the child (starting from child_first position)
    walkTree(child, cp.x, cp.y, UX, UY);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEWPORT
// ─────────────────────────────────────────────────────────────────────────────
function toCanvas(cx,cy){return[cx*vp.scale+vp.x, cy*vp.scale+vp.y];}
function toContent(px,py){return[(px-vp.x)/vp.scale, (py-vp.y)/vp.scale];}
function centreRoma(){vp.x=canW/2; vp.y=canH/2;}
function resetView(){vp={x:0,y:0,scale:1};centreRoma();draw();}
function zoom(f,px,py){
  const cv=document.getElementById('sch');
  px=px??cv.width/2; py=py??cv.height/2;
  const[wx,wy]=toContent(px,py);
  vp.scale=Math.max(.08,Math.min(12,vp.scale*f));
  vp.x=px-wx*vp.scale; vp.y=py-wy*vp.scale;
  draw();
}

// ─────────────────────────────────────────────────────────────────────────────
// TRAIN POSITIONING
// ─────────────────────────────────────────────────────────────────────────────
function trainPos(v){
  let pts=null;
  for(const ln of LINES){
    const u=v.route_id?.toUpperCase()||'';
    if(u.startsWith(ln.id)||(lc(v.route_id)===ln.col&&!pts)){pts=linePts[ln.id];break;}
  }
  if(!pts||!pts.length) pts=linePts['CAB']||[];
  const nn=s=>s.toLowerCase().replace(/,?\s*platform\s*\d+\s*$/i,'').replace(/\s+station$/i,'').trim();
  const nxt=nn(v.next_stops?.[0]?.stop_name||'');
  const cur=nn(v.current_stop_name||'');
  const fw=w=>w.split(' ')[0];
  let ni=-1,ci=-1;
  for(let i=0;i<pts.length;i++){
    const sn=nn(pts[i].name);
    if(ni<0&&nxt&&(sn===nxt||sn.startsWith(fw(nxt))||nxt.startsWith(fw(sn))))ni=i;
    if(ci<0&&cur&&(sn===cur||sn.startsWith(fw(cur))||cur.startsWith(fw(sn))))ci=i;
  }
  if(ni<0&&ci<0)return pts[Math.floor(pts.length/2)]||{x:0,y:0};
  if(v.current_status==='STOPPED_AT'||ni<0)return pts[ci>=0?ci:0]||pts[0];
  const fi=ci>=0?ci:Math.max(0,ni-1);
  if(fi===ni)return pts[ni];
  const a=pts[Math.min(fi,pts.length-1)],b=pts[Math.min(ni,pts.length-1)];
  return{x:(a.x+b.x)/2,y:(a.y+b.y)/2};
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────────────────────────────
const LW=4.5, SR=4.5;

function draw(){
  const cv=document.getElementById('sch'), ctx=cv.getContext('2d');
  ctx.clearRect(0,0,canW,canH);
  ctx.fillStyle='#0b0d10'; ctx.fillRect(0,0,canW,canH);

  // Dot grid
  ctx.fillStyle='rgba(255,255,255,0.02)';
  for(let x=24;x<canW;x+=24)for(let y=24;y<canH;y+=24){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}

  ctx.save(); ctx.translate(vp.x,vp.y); ctx.scale(vp.scale,vp.scale);
  ctx.lineCap='round'; ctx.lineJoin='round';

  // ── Draw segments ───────────────────────────────────────────────────────
  for(const seg of drawSegs){
    const n=seg.cols.length;
    for(let i=0;i<n;i++){
      const gap=3/vp.scale;
      const off=(i-(n-1)/2)*gap;
      const dx=seg.x2-seg.x1, dy=seg.y2-seg.y1;
      const len=Math.hypot(dx,dy)||1;
      const ox=-dy/len*off, oy=dx/len*off;
      ctx.strokeStyle=seg.cols[i];
      ctx.lineWidth=LW/vp.scale;
      ctx.globalAlpha=0.9;
      ctx.beginPath();
      ctx.moveTo(seg.x1+ox,seg.y1+oy);
      ctx.lineTo(seg.x2+ox,seg.y2+oy);
      ctx.stroke();
    }
  }
  ctx.globalAlpha=1;

  // ── Station nodes + labels ──────────────────────────────────────────────
  // Count how many lines use each station
  const stUsage={};
  for(const ln of LINES)for(const s of ln.stops)stUsage[s]=(stUsage[s]||0)+1;
  const termini=new Set();
  for(const ln of LINES){
    const vd=ln.stops.filter(s=>nodeXY[s]);
    if(vd.length){termini.add(vd[0]);termini.add(vd[vd.length-1]);}
  }

  // Sort by x for left-to-right label dedup
  const stList=Object.entries(nodeXY)
    .filter(([nm])=>nm!=='Roma Street')
    .map(([nm,pos])=>({nm,pos}))
    .sort((a,b)=>a.pos.x-b.pos.x);

  // Track last label screen-x per y-bucket and side
  const lblX={};

  for(const{nm,pos}of stList){
    const isJ=(stUsage[nm]||0)>1, isT=termini.has(nm);
    const r=(isJ?SR+2:isT?SR+1:SR*0.65)/vp.scale;
    const lw=1.5/vp.scale;
    const col=LINES.find(l=>l.stops.includes(nm))?.col||'#888';

    // Draw node symbol
    if(isJ){
      ctx.save();ctx.translate(pos.x,pos.y);
      ctx.beginPath();ctx.moveTo(0,-r*1.1);ctx.lineTo(r*1.1,0);ctx.lineTo(0,r*1.1);ctx.lineTo(-r*1.1,0);ctx.closePath();
      ctx.fillStyle='#1a2535';ctx.fill();ctx.strokeStyle='#c0d4ee';ctx.lineWidth=lw;ctx.stroke();
      ctx.restore();
    } else if(isT){
      ctx.beginPath();ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=lw;ctx.stroke();
    } else {
      ctx.beginPath();ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
      ctx.fillStyle='#111928';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();
    }

    // Labels
    const sx=pos.x*vp.scale+vp.x, sy=pos.y*vp.scale+vp.y;
    if(sx<-50||sx>canW+50||sy<-30||sy>canH+30)continue;
    if(!isJ&&!isT&&vp.scale<0.5)continue;
    if(isJ&&vp.scale<0.15)continue;

    // Decide label side based on y position relative to Roma St (y=0)
    // Segments above Roma (negative y in content) → label above
    // Segments below (positive y) → label below
    // Main corridor (y≈0) → alternate based on x bucket
    const ybucket=Math.round(pos.y/(vp.scale>0?1:1)*4)/4; // y in content units
    const contentY=pos.y; // content y
    let above;
    if(contentY<-0.5)      above=true;
    else if(contentY>0.5)  above=false;
    else                    above=(Math.round(pos.x)%2===0);

    const side=above?'a':'b';
    const slotKey=`${Math.round(contentY*2)}_${side}`;
    const lastX=lblX[slotKey]??-99999;
    const minGap=isJ?22:isT?22:50;
    if(!isJ&&!isT&&(sx-lastX)<minGap)continue;
    lblX[slotKey]=sx;

    const fs=Math.max(7,(isJ?10:isT?9.5:8)/vp.scale);
    ctx.fillStyle=isJ?'#c0d4ee':isT?col:'#4a6888';
    ctx.font=`${isJ||isT?'600 ':''}${fs}px -apple-system,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline=above?'bottom':'top';
    const label=nm.replace(/,?\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,'');
    ctx.fillText(label,pos.x,pos.y+(above?-1:1)*(r+2.5/vp.scale));
  }

  // ── Roma Street hub ─────────────────────────────────────────────────────
  {
    const r=10/vp.scale,lw=2/vp.scale;
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle='#1a2535';ctx.fill();ctx.strokeStyle='#ffffff';ctx.lineWidth=lw;ctx.stroke();
    if(vp.scale>0.2){
      ctx.fillStyle='#fff';
      ctx.font=`bold ${Math.max(7,8/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('Roma St',0,0);
    }
  }

  // ── Trains ────────────────────────────────────────────────────────────────
  for(const v of vehicles){
    const pos=trainPos(v),col=lc(v.route_id);
    const sel=selType==='train'&&selId===v.id;
    const delay=v.delay_seconds||0;
    const TW=(sel?34:26)/vp.scale, TH=(sel?14:10)/vp.scale, rx=2.5/vp.scale;
    const{x,y}=pos;

    // Glow
    const gr=ctx.createRadialGradient(x,y,0,x,y,TH*3);
    gr.addColorStop(0,col+'44');gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x,y,TH*3,0,Math.PI*2);ctx.fill();

    if(sel){
      const p=.3+.3*Math.abs(Math.sin(Date.now()/350));
      ctx.beginPath();ctx.arc(x,y,TH*2,0,Math.PI*2);
      ctx.strokeStyle=col;ctx.lineWidth=2/vp.scale;ctx.globalAlpha=p;ctx.stroke();ctx.globalAlpha=1;
    }

    // Body
    ctx.beginPath();
    ctx.moveTo(x-TW/2+rx,y-TH/2);ctx.lineTo(x+TW/2-rx,y-TH/2);
    ctx.arcTo(x+TW/2,y-TH/2,x+TW/2,y-TH/2+rx,rx);ctx.lineTo(x+TW/2,y+TH/2-rx);
    ctx.arcTo(x+TW/2,y+TH/2,x+TW/2-rx,y+TH/2,rx);ctx.lineTo(x-TW/2+rx,y+TH/2);
    ctx.arcTo(x-TW/2,y+TH/2,x-TW/2,y+TH/2-rx,rx);ctx.lineTo(x-TW/2,y-TH/2+rx);
    ctx.arcTo(x-TW/2,y-TH/2,x-TW/2+rx,y-TH/2,rx);ctx.closePath();
    ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=1.5/vp.scale;ctx.stroke();
    if(sel){ctx.strokeStyle='#fff';ctx.lineWidth=2/vp.scale;ctx.stroke();}

    // Highlight
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath();ctx.rect(x-TW/2+rx,y-TH/2,TW-rx*2,TH/3);ctx.fill();

    // Late stripe
    if(delay>60){ctx.fillStyle='#991111';ctx.fillRect(x-TW/2,y-TH/2,4/vp.scale,TH);}

    // Label
    if(vp.scale>0.3){
      const fs=Math.max(6,(sel?9:7)/vp.scale);
      ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.font=`bold ${fs}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText((v.route_id||'').slice(0,3),x,y+.5/vp.scale);
    }
    if(delay>60&&vp.scale>0.4){
      ctx.fillStyle='#ff7777';ctx.font=`bold ${Math.max(6,6/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(`+${Math.round(delay/60)}m`,x,y-TH/2-2/vp.scale);
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────────────────────────────────────
let dragging=false,dragS={},vpS={},selId=null,selType=null,vehicles=[];

function hitTest(cx,cy){
  const tr=14/vp.scale;
  for(const v of vehicles){const p=trainPos(v);if(Math.hypot(cx-p.x,cy-p.y)<tr)return{t:'train',v};}
  const sr=10/vp.scale;
  for(const[nm,pos]of Object.entries(nodeXY))if(Math.hypot(cx-pos.x,cy-pos.y)<sr)return{t:'station',n:nm};
  return null;
}
function handleHit(h){
  if(h.t==='train'){
    if(selId===h.v.id&&selType==='train'){clearD();return;}
    selId=h.v.id;selType='train';renderList();showTrain(h.v);
  } else {
    selId=h.n;selType='station';renderList();showStation(h.n);
  }
}

const sch=document.getElementById('sch');
sch.addEventListener('mousedown',e=>{
  const[cx,cy]=toContent(e.offsetX,e.offsetY);
  const h=hitTest(cx,cy);if(h){handleHit(h);return;}
  dragging=true;dragS={x:e.clientX,y:e.clientY};vpS={x:vp.x,y:vp.y};
});
sch.addEventListener('mousemove',e=>{if(!dragging)return;vp.x=vpS.x+(e.clientX-dragS.x);vp.y=vpS.y+(e.clientY-dragS.y);draw();});
sch.addEventListener('mouseup',()=>{dragging=false;});
sch.addEventListener('mouseleave',()=>{dragging=false;});
sch.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1.12:.89,e.offsetX,e.offsetY);},{passive:false});

// ─────────────────────────────────────────────────────────────────────────────
// PANELS
// ─────────────────────────────────────────────────────────────────────────────
function clearD(){selId=null;selType=null;document.getElementById('nosel').style.display='flex';document.getElementById('selc').style.display='none';}
function openD(){document.getElementById('nosel').style.display='none';document.getElementById('selc').style.display='flex';}
function mkrows(a){return a.map(([l,v,c])=>`<div class="ir"><span class="lb">${l}</span><span class="vl ${c||''}">${v}</span></div>`).join('');}

function showTrain(v){
  openD();
  const d=v.delay_seconds||0,ds=d===0?'On Time':d>0?`+${Math.round(d/60)}m late`:`${Math.round(d/60)}m early`,dc=d>60?'warn':d<-30?'info':'ok';
  const dirs=['N','NE','E','SE','S','SW','W','NW'],hd=v.bearing?dirs[Math.round(v.bearing/45)%8]+` ${v.bearing}°`:'—';
  const st=v.current_stop_name?(v.current_status==='STOPPED_AT'?'At ':'To ')+v.current_stop_name.replace(/,?\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,''):v.current_status?.replace(/_/g,' ')||'—';
  document.getElementById('sel-hdr').innerHTML=`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <div style="width:10px;height:10px;border-radius:2px;background:${lc(v.route_id)}"></div>
      <div style="font-weight:700;font-size:11px;color:#e8f0fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.route_id||'—'} → ${v.headsign||'—'}</div>
    </div>
    ${mkrows([['Train',v.label||v.id,''],['Status',st,''],['Delay',ds,dc],['Speed',v.speed?v.speed+' km/h':'—',''],['Heading',hd,'']])}`;
  const td=d,stops=v.next_stops||[];
  document.getElementById('sel-body').innerHTML=`<div class="itl">Next Stops</div>${stops.length?stops.map((s,i)=>{
    const nm=(s.stop_name||s.stop_id).replace(/,\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,'');
    const d2=s.arrival_delay;let ds2='';
    if(d2!=null){if(Math.abs(d2)<60)ds2='';else if(Math.abs(d2-td)>=60)ds2=d2>0?`+${Math.round(d2/60)}m`:`${Math.round(d2/60)}m`;}
    return`<div class="sr"><div class="sn">${i+1}</div><div class="sm">${nm}</div><div class="sd ${d2>60?'late':'ok'}">${ds2}</div></div>`;
  }).join(''):'<div style="color:#3a4a5e;font-size:10px">No data</div>'}`;
}

function minsUntil(t){if(!t)return'';const m=Math.round((t-Date.now()/1000)/60);return m<=0?'Now':`${m}m`;}

function showStation(name){
  openD();
  document.getElementById('sel-hdr').innerHTML=`<div class="itl">Station</div><div style="font-weight:700;font-size:11px;color:#e8f0fa">${name}</div>`;
  const nn=s=>s.toLowerCase().replace(/,?\s*platform\s*\d+\s*$/i,'').replace(/\s+station$/i,'').trim(),ns=nn(name),arr=[];
  for(const v of vehicles)for(const s of v.next_stops||[]){
    const sn=nn(s.stop_name||'');
    if(sn===ns||sn.startsWith(ns.split(' ')[0])||ns.startsWith(sn.split(' ')[0])){
      const delay=s.arrival_delay||0;
      arr.push({vid:v.id,route_id:v.route_id,headsign:v.headsign||v.label,delay,arr_time:(s.arrival_time||0)+delay,col:lc(v.route_id)});
    }
  }
  arr.sort((a,b)=>(a.arr_time||0)-(b.arr_time||0));
  const ft=t=>t?new Date(t*1000).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
  document.getElementById('sel-body').innerHTML=`<div class="itl">Next Arrivals</div>${arr.length?arr.slice(0,8).map(a=>{
    const mins=minsUntil(a.arr_time),ds=a.delay===0?'':a.delay>0?`+${Math.round(a.delay/60)}m`:`${Math.round(a.delay/60)}m`;
    return`<div class="ar" onclick="selectTrain('${a.vid}')">
      <div class="ab" style="background:${a.col}">${(a.route_id||'').slice(0,3)}</div>
      <div class="ad">${a.headsign||'—'}</div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-weight:700;font-size:11px;color:${mins==='Now'?'#ff8844':'#e8f0fa'}">${mins}</div>
        ${ds?`<div style="font-size:8px;color:${a.delay>60?'#ff4444':'#3ddc84'}">${ds}</div>`:''}
      </div>
    </div>`;
  }).join(''):'<div style="color:#3a4a5e;font-size:10px">No arrivals</div>'}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────────────────────
function renderList(){
  const q=document.getElementById('sbq').value.toLowerCase();
  const s=[...vehicles].filter(v=>!q||(v.route_id||'').toLowerCase().includes(q)||(v.headsign||'').toLowerCase().includes(q)||(v.line_name||'').toLowerCase().includes(q)).sort((a,b)=>(b.delay_seconds||0)-(a.delay_seconds||0));
  const dc=d=>d>60?'late':d<-30?'early':'ok',dl=d=>d>60?`+${Math.round(d/60)}m`:d<-30?`${Math.round(d/60)}m`:'On time';
  document.getElementById('tlist').innerHTML=s.length?s.map(v=>{
    const d=v.delay_seconds||0,sel=selType==='train'&&selId===v.id,bc=lc(v.route_id);
    return`<div class="en ${sel?'sel':''}" onclick="selectTrain('${v.id}')">
      <div class="et">
        <span class="rb" style="background:${bc}">${(v.headsign||v.route_id||'—').replace(/\s+[Ss]tation$/i,'').slice(0,18)}</span>
        <span class="dtg ${dc(d)}">${dl(d)}</span>
      </div>
      <div class="em">${v.current_stop_name?('→ '+v.current_stop_name.replace(/\s+[Ss]tation$/i,'').slice(0,20)):''}</div>
    </div>`;
  }).join(''):`<div style="color:#3a4a5e;padding:12px;text-align:center;font-size:10px">No trains</div>`;
}
function selectTrain(id){const v=vehicles.find(x=>x.id===id);if(!v)return;if(selId===id&&selType==='train'){clearD();return;}selId=id;selType='train';renderList();showTrain(v);}

// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
async function refresh(){
  try{
    const r=await fetch(API_BASE+'/vehicles'),d=await r.json();
    vehicles=d.vehicles||[];
    const late=vehicles.filter(v=>(v.delay_seconds||0)>60).length;
    document.getElementById('hcount').textContent=d.count||0;
    document.getElementById('hlate').textContent=late;
    document.getElementById('sbcount').textContent=d.count||0;
    const age=d.last_updated?Math.round(Date.now()/1000-d.last_updated):null;
    document.getElementById('hupdated').textContent=age!=null?`${age}s ago`:'—';
    renderList();
    if(selType==='train'&&selId){const v=vehicles.find(x=>x.id===selId);if(v)showTrain(v);else clearD();}
  }catch{document.getElementById('sled').classList.add('red');}
}

setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});},1000);
function animLoop(){draw();requestAnimationFrame(animLoop);}
function resize(){
  const c=document.getElementById('sch'),w=document.getElementById('cwrap');
  c.width=w.clientWidth;c.height=w.clientHeight;canW=c.width;canH=c.height;
  buildLayout(canW,canH);centreRoma();draw();
}
window.addEventListener('resize',resize);
loadColours();resize();refresh().then(()=>animLoop());setInterval(refresh,15000);
</script>
