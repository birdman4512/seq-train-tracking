<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SEQ Rail Control</title>
<style>
:root{--bg:#0b0d10;--p:#10141a;--p2:#161b23;--bd:#1e2738;--tx:#b8c8dc;--dm:#3a4a5e;--wh:#e8f0fa;--rd:#ff4444;--gn:#3ddc84;--bl:#4488ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}
header{height:42px;background:var(--p);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.logo{font-weight:700;font-size:13px;color:var(--wh);} .logo span{color:var(--dm);font-weight:400;}
.pill{background:var(--p2);border:1px solid var(--bd);border-radius:4px;padding:2px 9px;font-size:11px;color:var(--dm);display:flex;align-items:center;gap:5px;}
.pill .led{width:5px;height:5px;border-radius:50%;background:var(--gn);} .pill .led.red{background:var(--rd);} .pill strong{color:var(--tx);}
.ml{margin-left:auto;display:flex;gap:6px;align-items:center;}
.hbtn{background:var(--p2);border:1px solid var(--bd);border-radius:4px;padding:3px 11px;font-size:11px;font-family:inherit;color:var(--dm);cursor:pointer;}
.hbtn:hover{border-color:#3a4a5e;color:var(--tx);} .hbtn.on{background:#152030;border-color:#2a5080;color:#6aa8e0;}
#clock{font-size:11px;color:var(--dm);font-variant-numeric:tabular-nums;min-width:55px;text-align:right;}
.body{display:flex;flex:1;overflow:hidden;}
.sb{width:188px;background:var(--p);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.sbh{padding:8px 10px 6px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.sbh span{font-size:9px;font-weight:600;color:var(--dm);text-transform:uppercase;letter-spacing:1px;}
.cnt{background:var(--p2);border:1px solid var(--bd);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--tx);}
.sbs{padding:5px 7px;border-bottom:1px solid var(--bd);}
.sbs input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:3px;color:var(--tx);font-family:inherit;font-size:11px;padding:4px 7px;outline:none;}
.sbs input:focus{border-color:#2a5080;} .sbs input::placeholder{color:var(--dm);}
.tl{overflow-y:auto;flex:1;padding:3px;}
.en{border-radius:4px;padding:5px 7px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;}
.en:hover{background:var(--p2);} .en.sel{background:#0e1e30;border-color:#2a5080;}
.et{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px;}
.er{font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px;}
.rd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dtg{font-size:8px;padding:1px 3px;border-radius:2px;font-weight:600;}
.dtg.ok{background:#0a1f12;color:var(--gn);} .dtg.late{background:#1f0a0a;color:var(--rd);} .dtg.early{background:#0a0f1f;color:var(--bl);}
.ed{font-size:9px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.em{font-size:8px;color:var(--dm);margin-top:1px;}
.cw{flex:1;position:relative;overflow:hidden;background:var(--bg);}
#sch{display:block;cursor:grab;} #sch:active{cursor:grabbing;}
.zb{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:3px;}
.zz{width:28px;height:28px;background:rgba(16,20,26,.95);border:1px solid var(--bd);color:var(--tx);font-size:16px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.zz:hover{background:var(--p2);}
.inf{width:220px;background:var(--p);border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.isc{padding:8px 10px;border-bottom:1px solid var(--bd);}
.itl{font-size:9px;font-weight:600;color:var(--dm);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.ir{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #111820;font-size:10px;}
.ir:last-child{border:none;} .ir .lb{color:var(--dm);}
.ir .vl{color:var(--tx);font-weight:500;text-align:right;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ir .vl.ok{color:var(--gn);} .ir .vl.warn{color:var(--rd);} .ir .vl.info{color:var(--bl);}
.sl{overflow-y:auto;flex:1;padding:8px 10px;}
.sr{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid #111820;font-size:10px;}
.sr:last-child{border:none;}
.sn{width:14px;height:14px;border-radius:50%;background:var(--p2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--dm);flex-shrink:0;}
.sm{flex:1;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sd{font-size:9px;font-weight:600;} .sd.ok{color:var(--gn);} .sd.late{color:var(--rd);}
.ar{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid #111820;font-size:10px;cursor:pointer;border-radius:3px;}
.ar:hover{background:var(--p2);} .ar:last-child{border-bottom:none;}
.ab{width:30px;height:14px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;}
.ad{flex:1;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.at{font-size:9px;color:var(--dm);white-space:nowrap;}
.adl{font-size:8px;font-weight:600;} .adl.ok{color:var(--gn);} .adl.late{color:var(--rd);}
.nos{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dm);font-size:10px;text-align:center;line-height:2;padding:16px;}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:var(--p);} ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="logo">SEQ Rail <span>/ Control</span></div>
  <div class="pill"><div class="led" id="sled"></div>Live <strong id="hcount">—</strong></div>
  <div class="pill"><div class="led red"></div><strong id="hlate" style="color:var(--rd)">—</strong> late</div>
  <div class="pill">Updated <strong id="hupdated">—</strong></div>
  <div class="ml">
    <span id="clock">00:00:00</span>
    <button class="hbtn" onclick="location.href='/'">🗺 Map</button>
    <button class="hbtn on">🖥 Control</button>
  </div>
</header>
<div class="body">
  <div class="sb">
    <div class="sbh"><span>Trains</span><span class="cnt" id="sbcount">0</span></div>
    <div class="sbs"><input id="sbq" placeholder="Search…" oninput="renderList()"/></div>
    <div class="tl" id="tlist"></div>
  </div>
  <div class="cw" id="cwrap"><canvas id="sch"></canvas>
    <div class="zb">
      <button class="zz" onclick="zoom(1.2)">+</button>
      <button class="zz" onclick="zoom(.83)">−</button>
      <button class="zz" onclick="resetView()" style="font-size:11px">⌂</button>
    </div>
  </div>
  <div class="inf">
    <div class="nos" id="nosel">Select a train<br/>or station</div>
    <div id="selc" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="isc" id="sel-hdr"></div>
      <div class="sl" id="sel-body"></div>
    </div>
  </div>
</div>
<script>
// ── Colours ───────────────────────────────────────────────────────────────────
const RMAP={};
const RULES=[
  {k:'SH',c:'#00aeef'},{k:'SP',c:'#1c63b7'},{k:'VL',c:'#f5a400'},
  {k:'RW',c:'#f47920'},{k:'FG',c:'#e3000f'},{k:'DO',c:'#e0007f'},
  {k:'AP',c:'#6b21a8'},{k:'CL',c:'#ffd600'},{k:'BE',c:'#6fbe44'},
  {k:'CA',c:'#7b2d8b'},{k:'NA',c:'#7b2d8b'},{k:'KP',c:'#00b5cc'},
  {k:'IP',c:'#f47920'},{k:'RP',c:'#00b5cc'},{k:'IM',c:'#6fbe44'},
  {k:'FER',c:'#e3000f'},{k:'CAB',c:'#7b2d8b'},{k:'KCL',c:'#00b5cc'},
  {k:'IPL',c:'#f47920'},{k:'SPR',c:'#1c63b7'},{k:'BEL',c:'#6fbe44'},
  {k:'CLV',c:'#ffd600'},{k:'GOL',c:'#f5a400'},{k:'SHO',c:'#00aeef'},
  {k:'AIR',c:'#6b21a8'},{k:'DOO',c:'#e0007f'},{k:'NAI',c:'#7b2d8b'},
  {k:'ROS',c:'#f47920'},{k:'BAN',c:'#6b21a8'},
];
function lc(rid){
  if(!rid)return'#5a6478';
  if(RMAP[rid])return RMAP[rid];
  const u=rid.toUpperCase();
  for(const{k,c}of RULES)if(u.includes(k))return c;
  return'#7a8899';
}
async function loadColours(){
  const go=async()=>{
    try{
      const[r1,r2]=await Promise.all([fetch('/api/debug/routes'),fetch('/api/debug/live')]);
      const[d1,d2]=await Promise.all([r1.json(),r2.json()]);
      let n=0;
      for(const rt of(d1.gtfs_routes||[])){const c=rt.gtfs_color||rt.computed_colour;if(c&&c!=='#5bb8ff'){RMAP[rt.route_id]=c;n++;}}
      for(const rt of(d2.live_route_ids||[])){const c=rt.gtfs_colour||rt.computed_colour;if(c&&c!=='#5bb8ff')RMAP[rt.route_id]=c;}
      if(!n)setTimeout(go,5000);
    }catch{setTimeout(go,6000);}
  };go();
}

// ══════════════════════════════════════════════════════════════════════════════
// SCHEMATIC LAYOUT
//
// Each line is an independent horizontal snake.  Roma Street is a VERTICAL
// AXIS at x=0 (canvas centre).  Every line's stop list is split at Roma Street:
//   • Stops before Roma  → placed to the LEFT  of x=0
//   • Stops after Roma   → placed to the RIGHT of x=0
//
// Lines above Roma Street (dir:'up') and below (dir:'dn') are stacked
// vertically.  Within each direction the lines are arranged so that lines
// sharing the most track with each other are adjacent.
//
// Each line snakes: if it has more stops than fit in one horizontal row it
// wraps, curving at the edge of the canvas and continuing on the next row.
// ══════════════════════════════════════════════════════════════════════════════

// Line definitions.  stops[] is in OUTBOUND order FROM Roma Street.
// 'left' stops are city-end stops that precede Roma Street.
// We list them terminus→Roma Street so index 0 is the far end.
const LINES = [
  // ── ABOVE Roma Street ──────────────────────────────────────────────────────
  { id:'CAB', col:'#7b2d8b', side:'up', name:'Caboolture/SC',
    left:  ['Gympie North','Nambour','Woombye','Landsborough','Beerwah','Glasshouse Mountains','Beerburrum','Elimbah','Caboolture','Morayfield','Burpengary','Narangba','Petrie','Lawnton','Strathpine','Bald Hills','Carseldine','Northgate','Eagle Junction','Bowen Hills','Fortitude Valley','Central'],
    right: [] },

  { id:'KCL', col:'#00b5cc', side:'up', name:'Redcliffe',
    left:  ['Kippa-Ring','Rothwell','Mango Hill East','Mango Hill','Murrumba Downs','Kallangur','Lawnton','Bray Park','Strathpine','Bald Hills','Carseldine','Northgate','Eagle Junction','Bowen Hills','Fortitude Valley','Central'],
    right: [] },

  { id:'SHO', col:'#00aeef', side:'up', name:'Shorncliffe',
    left:  ['Shorncliffe','Sandgate','Deagon','North Boondall','Boondall','Nudgee','Banyo','Bindha','Northgate','Nundah','Toombul','Eagle Junction','Wooloowin','Albion','Bowen Hills','Fortitude Valley','Central'],
    right: [] },

  { id:'AIR', col:'#6b21a8', side:'up', name:'Airport',
    left:  ['International Airport','Domestic Airport','Eagle Junction','Wooloowin','Albion','Bowen Hills','Fortitude Valley','Central'],
    right: [] },

  { id:'DOO', col:'#e0007f', side:'up', name:'Doomben',
    left:  ['Doomben','Ascot','Hendra','Clayfield','Eagle Junction','Wooloowin','Albion','Bowen Hills','Fortitude Valley','Central'],
    right: [] },

  { id:'FER', col:'#e3000f', side:'up', name:'Ferny Grove',
    left:  ['Ferny Grove','Keperra','Grovely','Oxford Park','Mitchelton','Gaythorne','Enoggera','Alderley','Newmarket','Wilston','Windsor','Bowen Hills','Fortitude Valley','Central'],
    right: [] },

  // ── BELOW Roma Street ──────────────────────────────────────────────────────
  { id:'IPL', col:'#f47920', side:'dn', name:'Ipswich/Rosewood',
    left:  [],
    right: ['Milton','Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra','Wacol','Gailes','Goodna','Redbank','Riverview','Dinmore','Bundamba','Booval','Ipswich','Walloon','Rosewood'] },

  { id:'SPR', col:'#1c63b7', side:'dn', name:'Springfield',
    left:  [],
    right: ['Milton','Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra','Richlands','Springfield','Springfield Central'] },

  { id:'BEL', col:'#6fbe44', side:'dn', name:'Beenleigh',
    left:  [],
    right: ['South Brisbane','South Bank','Boggo Road','Dutton Park','Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury','Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove','Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania','Edens Landing','Holmview','Beenleigh'] },

  { id:'GOL', col:'#f5a400', side:'dn', name:'Gold Coast',
    left:  [],
    right: ['South Brisbane','South Bank','Boggo Road','Altandi','Loganlea','Beenleigh','Ormeau','Pimpama','Coomera','Helensvale','Nerang','Robina','Varsity Lakes'] },

  { id:'CLV', col:'#ffd600', side:'dn', name:'Cleveland',
    left:  [],
    right: ['South Brisbane','South Bank','Boggo Road','Buranda','Coorparoo','Norman Park','Morningside','Cannon Hill','Murarrie','Hemmant','Lindum','Wynnum North','Wynnum','Wynnum Central','Manly','Lota','Thorneside','Birkdale','Wellington Point','Ormiston','Cleveland'] },
];

// ── Layout constants ──────────────────────────────────────────────────────────
const ROW_H = 56;    // px between row centres
const LW    = 5;     // line thickness
const SR    = 5;     // station dot radius
const MIN_STOP_PX = 58; // minimum pixels between stations

// Layout state — rebuilt on resize
let layout  = [];  // [{line, stops:[{name,x,y}]}]
let canW=0, canH=0;
let vp = {x:0, y:0, scale:1};

function buildLayout(W, H) {
  layout = [];

  // Usable half-widths
  const leftW  = W * 0.5 - 10;   // space left  of centre
  const rightW = W * 0.5 - 10;   // space right of centre

  // How many stops fit on one row (each side)
  const leftPerRow  = Math.max(3, Math.floor(leftW  / MIN_STOP_PX));
  const rightPerRow = Math.max(3, Math.floor(rightW / MIN_STOP_PX));

  // Separate up/down lines and assign row offsets
  // upLines   → rows at y = -ROW_H, -2*ROW_H, ...  (above Roma St)
  // downLines → rows at y = +ROW_H, +2*ROW_H, ...  (below Roma St)
  let upRowUsed   = 0;
  let downRowUsed = 0;

  for (const line of LINES) {
    const leftStops  = line.left  || [];   // terminus … Central  (drawn left of Roma)
    const rightStops = line.right || [];   // Milton … terminus   (drawn right of Roma)

    // Build the full ordered stop array: leftStops (reversed so Central is nearest Roma)
    // then Roma Street itself, then rightStops
    // leftStops[0] = far terminus, leftStops[last] = Central (just before Roma)
    // We'll place them from left edge → Roma Street
    const allStops = [];

    // Left side: distribute from far-left to Roma Street (x = -leftW to 0)
    const leftRows = Math.max(1, Math.ceil(leftStops.length / leftPerRow));
    let li = 0;
    for (let r = 0; r < leftRows; r++) {
      const inRow = Math.min(leftPerRow, leftStops.length - li);
      if (inRow <= 0) break;
      // Row Y offset from Roma Street
      let rowY;
      if (line.side === 'up') {
        upRowUsed++;
        rowY = -upRowUsed * ROW_H;
      } else {
        downRowUsed++;
        rowY = downRowUsed * ROW_H;
      }
      const goRight = (r % 2 === 0); // first row: left terminus → Roma (goRight)
      for (let j = 0; j < inRow; j++, li++) {
        const name = leftStops[li];
        // x: spread evenly from -leftW to 0
        // goRight: j=0 at -leftW, j=inRow-1 near 0
        // goLeft:  j=0 near 0, j=inRow-1 at -leftW
        const frac = (inRow > 1) ? j / (inRow - 1) : 0.5;
        const x = goRight
          ? -leftW + frac * leftW
          : -(frac * leftW);
        allStops.push({ name, x, y: rowY });
      }
      if (r < leftRows - 1) upRowUsed++; // extra row for wrap
    }

    // Roma Street at (0, 0) — every line passes through here
    allStops.push({ name: 'Roma Street', x: 0, y: 0, isRoma: true });

    // Right side: distribute from Roma Street to far-right (x = 0 to rightW)
    const rightRows = Math.max(1, Math.ceil(rightStops.length / rightPerRow));
    let ri = 0;
    for (let r = 0; r < rightRows; r++) {
      const inRow = Math.min(rightPerRow, rightStops.length - ri);
      if (inRow <= 0) break;
      let rowY;
      if (line.side === 'up') {
        upRowUsed++;
        rowY = -upRowUsed * ROW_H;
      } else {
        downRowUsed++;
        rowY = downRowUsed * ROW_H;
      }
      const goRight = (r % 2 === 0);
      for (let j = 0; j < inRow; j++, ri++) {
        const name = rightStops[ri];
        const frac = (inRow > 1) ? j / (inRow - 1) : 0.5;
        const x = goRight
          ? frac * rightW
          : rightW - frac * rightW;
        allStops.push({ name, x, y: rowY });
      }
      if (r < rightRows - 1) downRowUsed++;
    }

    layout.push({ line, stops: allStops });
  }
}

// ── Viewport ──────────────────────────────────────────────────────────────────
function toCanvas(cx, cy) { return [cx * vp.scale + vp.x, cy * vp.scale + vp.y]; }
function toContent(px, py) { return [(px - vp.x) / vp.scale, (py - vp.y) / vp.scale]; }

// Roma Street is at content (0,0) — map to canvas centre
function centreView() { vp.x = canW / 2; vp.y = canH / 2; }
function resetView()  { vp = {x:0, y:0, scale:1}; centreView(); draw(); }

function zoom(f, px, py) {
  const c = document.getElementById('sch');
  px = px ?? c.width / 2; py = py ?? c.height / 2;
  const [wx, wy] = toContent(px, py);
  vp.scale = Math.max(.1, Math.min(8, vp.scale * f));
  vp.x = px - wx * vp.scale;
  vp.y = py - wy * vp.scale;
  draw();
}

// ── Train → position on diagram ───────────────────────────────────────────────
function trainPos(v) {
  // Find which line row this train belongs to
  let row = layout.find(r => {
    const u = v.route_id?.toUpperCase() || '';
    return u.startsWith(r.line.id) || (lc(v.route_id) === r.line.col);
  });
  if (!row) row = layout[0];
  const stops = row.stops;

  const nn = s => s.toLowerCase()
    .replace(/,?\s*platform\s*\d+\s*$/i, '')
    .replace(/\s+station$/i, '').trim();
  const nxt = nn(v.next_stops?.[0]?.stop_name || '');
  const cur = nn(v.current_stop_name || '');
  const fw  = w => w.split(' ')[0];

  let ni = -1, ci = -1;
  for (let i = 0; i < stops.length; i++) {
    const sn = nn(stops[i].name);
    if (ni < 0 && nxt && (sn === nxt || sn.startsWith(fw(nxt)) || nxt.startsWith(fw(sn)))) ni = i;
    if (ci < 0 && cur && (sn === cur || sn.startsWith(fw(cur)) || cur.startsWith(fw(sn)))) ci = i;
  }

  if (ni < 0 && ci < 0) return stops[Math.floor(stops.length / 2)] || {x:0,y:0};
  if (v.current_status === 'STOPPED_AT' || ni < 0) return stops[ci >= 0 ? ci : 0] || stops[0];
  const fi = ci >= 0 ? ci : Math.max(0, ni - 1);
  if (fi === ni) return stops[ni];
  const a = stops[Math.min(fi, stops.length-1)];
  const b = stops[Math.min(ni, stops.length-1)];
  // Only interpolate if on same row (same y)
  if (Math.abs(a.y - b.y) < 2) return { x: (a.x+b.x)/2, y: a.y };
  return a;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  const cv  = document.getElementById('sch');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, canW, canH);
  ctx.fillStyle = '#0b0d10'; ctx.fillRect(0, 0, canW, canH);

  // Dot grid (screen-space, not transformed)
  ctx.fillStyle = 'rgba(255,255,255,.02)';
  for (let x = 24; x < canW; x += 24)
    for (let y = 24; y < canH; y += 24) {
      ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill();
    }

  ctx.save();
  ctx.translate(vp.x, vp.y);
  ctx.scale(vp.scale, vp.scale);

  // ── Vertical Roma Street axis ───────────────────────────────────────────
  // Find y-extent of all stops
  let minY = 0, maxY = 0;
  for (const row of layout)
    for (const s of row.stops) { minY = Math.min(minY, s.y); maxY = Math.max(maxY, s.y); }
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2 / vp.scale;
  ctx.setLineDash([8/vp.scale, 6/vp.scale]);
  ctx.beginPath(); ctx.moveTo(0, minY - ROW_H*0.5); ctx.lineTo(0, maxY + ROW_H*0.5); ctx.stroke();
  ctx.setLineDash([]);

  // ── Draw each line ─────────────────────────────────────────────────────
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  for (const row of layout) {
    const { line, stops } = row;
    if (stops.length < 2) continue;

    ctx.strokeStyle = line.col;
    ctx.lineWidth   = LW / vp.scale;
    ctx.globalAlpha = 0.85;

    // Draw segments. When y changes (row wrap), draw a bezier bend.
    ctx.beginPath();
    let prevX = stops[0].x, prevY = stops[0].y;
    ctx.moveTo(prevX, prevY);

    for (let i = 1; i < stops.length; i++) {
      const s = stops[i];
      if (Math.abs(s.y - prevY) > 2) {
        // Row transition — S-curve
        const my = (prevY + s.y) / 2;
        ctx.bezierCurveTo(prevX, my, s.x, my, s.x, s.y);
      } else {
        ctx.lineTo(s.x, s.y);
      }
      prevX = s.x; prevY = s.y;
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // ── Station nodes ──────────────────────────────────────────────────
    // Track label positions per y-row to avoid overlap
    const labeledX = {};  // rowKey → last screen-x of label

    stops.forEach((st, i) => {
      if (st.isRoma) return; // drawn separately

      const isTerminus = (i === 0 || i === stops.length - 1);
      const r  = (isTerminus ? SR + 1 : SR * 0.75) / vp.scale;
      const lw = 1.8 / vp.scale;

      if (isTerminus) {
        ctx.beginPath(); ctx.arc(st.x, st.y, r, 0, Math.PI * 2);
        ctx.fillStyle = line.col; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.lineWidth = lw; ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(st.x, st.y, r, 0, Math.PI * 2);
        ctx.fillStyle = '#131820'; ctx.fill();
        ctx.strokeStyle = line.col; ctx.lineWidth = lw; ctx.stroke();
      }

      // Label: skip if too close to previous label on same y-row
      const screenX = st.x * vp.scale + vp.x;
      const rowKey  = Math.round(st.y / 4) * 4;  // bucket by 4px
      const lastX   = labeledX[rowKey] ?? -9999;
      const minGap  = isTerminus ? 0 : 50;
      if (!isTerminus && (screenX - lastX) < minGap) return;
      labeledX[rowKey] = screenX;

      const fs = Math.max(7, (isTerminus ? 9.5 : 8) / vp.scale);
      ctx.fillStyle = isTerminus ? line.col : '#6a7e96';
      ctx.font = `${isTerminus ? '600 ' : ''}${fs}px -apple-system,sans-serif`;
      ctx.textAlign = 'center';
      // Labels above for 'up' lines, below for 'dn' lines
      const above = (line.side === 'up');
      ctx.textBaseline = above ? 'bottom' : 'top';
      const lname = st.name.replace(/,?\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/,'');
      ctx.fillText(lname, st.x, above ? st.y - r - 3/vp.scale : st.y + r + 3/vp.scale);
    });
  }

  // ── Roma Street hub ────────────────────────────────────────────────────
  {
    const r = 12 / vp.scale;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = '#1e2a3a'; ctx.fill();
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5/vp.scale; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    const fs = Math.max(7, 9/vp.scale);
    ctx.font = `bold ${fs}px -apple-system,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Roma St', 0, 0);
  }

  // ── Trains ────────────────────────────────────────────────────────────
  for (const v of vehicles) {
    const pos   = trainPos(v);
    const col   = lc(v.route_id);
    const sel   = selType === 'train' && selId === v.id;
    const delay = v.delay_seconds || 0;
    const TW    = (sel ? 36 : 28) / vp.scale;
    const TH    = (sel ? 16 : 12) / vp.scale;
    const rx    = 3 / vp.scale;
    const { x, y } = pos;

    // Glow
    const gr = ctx.createRadialGradient(x,y,0,x,y,TH*2.5);
    gr.addColorStop(0, col+'55'); gr.addColorStop(1,'transparent');
    ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(x,y,TH*2.5,0,Math.PI*2); ctx.fill();

    if (sel) {
      const p = .35 + .35*Math.abs(Math.sin(Date.now()/350));
      ctx.beginPath(); ctx.arc(x,y,TH*1.7,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=2/vp.scale; ctx.globalAlpha=p; ctx.stroke(); ctx.globalAlpha=1;
    }

    // Body
    ctx.beginPath();
    ctx.moveTo(x-TW/2+rx,y-TH/2); ctx.lineTo(x+TW/2-rx,y-TH/2);
    ctx.arcTo(x+TW/2,y-TH/2,x+TW/2,y-TH/2+rx,rx);
    ctx.lineTo(x+TW/2,y+TH/2-rx); ctx.arcTo(x+TW/2,y+TH/2,x+TW/2-rx,y+TH/2,rx);
    ctx.lineTo(x-TW/2+rx,y+TH/2); ctx.arcTo(x-TW/2,y+TH/2,x-TW/2,y+TH/2-rx,rx);
    ctx.lineTo(x-TW/2,y-TH/2+rx); ctx.arcTo(x-TW/2,y-TH/2,x-TW/2+rx,y-TH/2,rx);
    ctx.closePath();
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.65)'; ctx.lineWidth=1.5/vp.scale; ctx.stroke();
    if(sel){ctx.strokeStyle='#fff';ctx.lineWidth=2/vp.scale;ctx.stroke();}

    // Highlight
    ctx.beginPath(); ctx.rect(x-TW/2+rx,y-TH/2,TW-rx*2,TH/3);
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fill();
    // Cab
    ctx.fillStyle='rgba(180,220,255,.4)';
    ctx.fillRect(x+TW/2-6/vp.scale,y-TH/2+2/vp.scale,3.5/vp.scale,TH-4/vp.scale);
    // Late
    if(delay>60){ctx.fillStyle='#aa1111';ctx.fillRect(x-TW/2,y-TH/2,5/vp.scale,TH);}

    const fs = Math.max(6,(sel?10:8)/vp.scale);
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.font=`bold ${fs}px -apple-system,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText((v.route_id||'').slice(0,3), x-1/vp.scale, y+.5/vp.scale);
    if(delay>60){
      ctx.fillStyle='#ff6666';
      ctx.font=`bold ${Math.max(6,7/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(`+${Math.round(delay/60)}m`,x,y-TH/2-2/vp.scale);
    }
  }

  ctx.restore();
}

// ── Interaction ───────────────────────────────────────────────────────────────
let dragging=false, dragS={}, vpS={};
let selId=null, selType=null, vehicles=[];

function hitTest(cx, cy) {
  const tr = 16/vp.scale;
  for (const v of vehicles) { const p=trainPos(v); if(Math.hypot(cx-p.x,cy-p.y)<tr) return{t:'train',v}; }
  const sr = 12/vp.scale;
  for (const row of layout)
    for (const st of row.stops)
      if (Math.hypot(cx-st.x,cy-st.y) < sr) return {t:'station', n:st.name};
  // Roma Street
  if (Math.hypot(cx,cy) < 16/vp.scale) return {t:'station', n:'Roma Street'};
  return null;
}
function handleHit(h) {
  if (h.t==='train') {
    if(selId===h.v.id&&selType==='train'){clearD();return;}
    selId=h.v.id;selType='train';renderList();showTrain(h.v);
  } else {
    selId=h.n;selType='station';renderList();showStation(h.n);
  }
}

const sch = document.getElementById('sch');
sch.addEventListener('mousedown', e => {
  const[cx,cy]=toContent(e.offsetX,e.offsetY);
  const h=hitTest(cx,cy); if(h){handleHit(h);return;}
  dragging=true; dragS={x:e.clientX,y:e.clientY}; vpS={x:vp.x,y:vp.y};
});
sch.addEventListener('mousemove', e => {
  if(!dragging)return; vp.x=vpS.x+(e.clientX-dragS.x); vp.y=vpS.y+(e.clientY-dragS.y); draw();
});
sch.addEventListener('mouseup',   ()=>{ dragging=false; });
sch.addEventListener('mouseleave',()=>{ dragging=false; });
sch.addEventListener('wheel', e => {
  e.preventDefault(); zoom(e.deltaY<0?1.12:.89, e.offsetX, e.offsetY);
}, {passive:false});

// ── Panels ────────────────────────────────────────────────────────────────────
function clearD(){ selId=null;selType=null;document.getElementById('nosel').style.display='flex';document.getElementById('selc').style.display='none'; }
function openD(){  document.getElementById('nosel').style.display='none'; document.getElementById('selc').style.display='flex'; }
function mkrows(a){ return a.map(([l,v,c])=>`<div class="ir"><span class="lb">${l}</span><span class="vl ${c||''}" title="${v}">${v}</span></div>`).join(''); }

function showTrain(v) {
  openD();
  const d=v.delay_seconds||0;
  const ds=d===0?'On Time':d>0?`+${Math.round(d/60)}m late`:`${Math.round(d/60)}m early`;
  const dc=d>60?'warn':d<-30?'info':'ok';
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const hd=v.bearing?dirs[Math.round(v.bearing/45)%8]+` ${Math.round(v.bearing)}°`:'—';
  const st=v.current_stop_name?(v.current_status==='STOPPED_AT'?'At ':'To ')+v.current_stop_name:v.current_status?.replace(/_/g,' ')||'—';
  document.getElementById('sel-hdr').innerHTML=`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
      <div style="width:12px;height:12px;border-radius:2px;background:${lc(v.route_id)};flex-shrink:0"></div>
      <div style="font-weight:700;font-size:12px;color:var(--wh)">${v.route_id||'—'} → ${v.headsign||'—'}</div>
    </div>${mkrows([['Train',v.label||v.id,''],['Status',st,''],['Delay',ds,dc],['Speed',v.speed?v.speed+' km/h':'—',''],['Heading',hd,'']])}`;
  const td=d, stops=v.next_stops||[];
  document.getElementById('sel-body').innerHTML=`<div class="itl">Next Stops</div>
    ${stops.length?stops.map((s,i)=>{
      const raw=s.stop_name||s.stop_id;
      const nm=raw.replace(/,\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/,'');
      const d2=s.arrival_delay;
      let ds2='';
      if(d2!=null){if(Math.abs(d2)<60)ds2='On time';else if(Math.abs(d2-td)>=60)ds2=d2>0?`+${Math.round(d2/60)}m`:`${Math.round(d2/60)}m`;}
      return`<div class="sr"><div class="sn">${i+1}</div><div class="sm">${nm}</div><div class="sd ${d2>60?'late':'ok'}">${ds2}</div></div>`;
    }).join(''):'<div style="color:var(--dm);font-size:10px">No stop data</div>'}`;
}

function minsUntil(t){ if(!t)return''; const m=Math.round((t-Date.now()/1000)/60); return m<=0?'Now':m===1?'1 min':`${m} mins`; }

function showStation(name) {
  openD();
  document.getElementById('sel-hdr').innerHTML=`<div class="itl">Station</div><div style="font-weight:700;font-size:12px;color:var(--wh)">${name}</div>`;
  const nn=s=>s.toLowerCase().replace(/,?\s*platform\s*\d+\s*$/i,'').replace(/\s+station$/i,'').trim();
  const ns=nn(name);
  const arr=[];
  for(const v of vehicles){
    for(const s of v.next_stops||[]){
      const sn=nn(s.stop_name||'');
      if(sn===ns||sn.startsWith(ns.split(' ')[0])||ns.startsWith(sn.split(' ')[0])){
        const delay=s.arrival_delay||0;
        arr.push({vid:v.id,route_id:v.route_id,headsign:v.headsign||v.label,delay,arr_time:(s.arrival_time||0)+delay,col:lc(v.route_id)});
      }
    }
  }
  arr.sort((a,b)=>(a.arr_time||0)-(b.arr_time||0));
  const ft=t=>t?new Date(t*1000).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
  document.getElementById('sel-body').innerHTML=`<div class="itl">Next Arrivals — click to track</div>
    ${arr.length?arr.slice(0,8).map(a=>{
      const mins=minsUntil(a.arr_time);
      const ds=a.delay===0?'On time':a.delay>0?`+${Math.round(a.delay/60)}m late`:`${Math.abs(Math.round(a.delay/60))}m early`;
      return`<div class="ar" onclick="selectTrain('${a.vid}')">
        <div class="ab" style="background:${a.col}">${(a.route_id||'').slice(0,3)}</div>
        <div class="ad">${a.headsign||'—'}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0">
          <div style="color:${mins==='Now'?'#ff8844':'var(--wh)'};font-weight:600;font-size:11px">${mins}</div>
          <div class="at">${ft(a.arr_time)}</div>
          <div class="adl ${a.delay>60?'late':'ok'}">${ds}</div>
        </div>
      </div>`;
    }).join(''):'<div style="color:var(--dm);font-size:10px">No arrivals found</div>'}`;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderList() {
  const q=document.getElementById('sbq').value.toLowerCase();
  const s=[...vehicles].filter(v=>!q||v.route_id?.toLowerCase().includes(q)||v.label?.toLowerCase().includes(q)||v.headsign?.toLowerCase().includes(q)).sort((a,b)=>(b.delay_seconds||0)-(a.delay_seconds||0));
  const dc=d=>d>60?'late':d<-30?'early':'ok';
  const dl=d=>d>60?`+${Math.round(d/60)}m`:d<-30?`${Math.round(d/60)}m`:'On time';
  document.getElementById('tlist').innerHTML=s.length
    ?s.map(v=>{
        const d=v.delay_seconds||0;const sel=selType==='train'&&selId===v.id;
        return`<div class="en ${sel?'sel':''}" onclick="selectTrain('${v.id}')">
          <div class="et"><div class="er"><div class="rd" style="background:${lc(v.route_id)}"></div>${v.route_id||'—'}</div><div class="dtg ${dc(d)}">${dl(d)}</div></div>
          <div class="ed">${v.headsign?'→ '+v.headsign:v.label||'—'}</div>
          <div class="em">${v.speed?v.speed+'km/h':''} ${v.current_stop_name?.slice(0,14)||''}</div>
        </div>`;}).join('')
    :`<div style="color:var(--dm);padding:14px;text-align:center;font-size:10px">No trains</div>`;
}
function selectTrain(id) {
  const v=vehicles.find(x=>x.id===id); if(!v)return;
  if(selId===id&&selType==='train'){clearD();return;}
  selId=id;selType='train';renderList();showTrain(v);
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function refresh(){
  try{
    const r=await fetch('/api/vehicles'), d=await r.json();
    vehicles=d.vehicles||[];
    const late=vehicles.filter(v=>(v.delay_seconds||0)>60).length;
    document.getElementById('hcount').textContent=d.count||0;
    document.getElementById('hlate').textContent=late;
    document.getElementById('sbcount').textContent=d.count||0;
    const age=d.last_updated?Math.round(Date.now()/1000-d.last_updated):null;
    document.getElementById('hupdated').textContent=age!=null?`${age}s ago`:'—';
    renderList();
    if(selType==='train'&&selId){const v=vehicles.find(x=>x.id===selId);if(v)showTrain(v);else clearD();}
  }catch{document.getElementById('sled').classList.add('red');}
}

// ── Boot ──────────────────────────────────────────────────────────────────────
setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
},1000);
function animLoop(){ draw(); requestAnimationFrame(animLoop); }
function resize(){
  const c=document.getElementById('sch'), w=document.getElementById('cwrap');
  c.width=w.clientWidth; c.height=w.clientHeight;
  canW=c.width; canH=c.height;
  buildLayout(canW, canH);
  centreView();
  draw();
}
window.addEventListener('resize', resize);
loadColours();
resize();
refresh().then(()=>animLoop());
setInterval(refresh, 15000);
</script>
