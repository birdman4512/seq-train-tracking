<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b0d10;color:#b8c8dc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}

#sidebar-toggle:hover{background:#1e2738;color:#b8c8dc;}
.sbh{padding:6px 8px;border-bottom:1px solid #1e2738;display:flex;justify-content:space-between;align-items:center;}

<body>
<header>
  <div class="logo">Train<span>Int</span> <span>/ Control</span></div>
  <div class="pill"><div class="led" id="sled"></div>Live <strong id="hcount">—</strong></div>
  <div class="pill"><strong id="hlate" style="color:#ff4444">—</strong> late</div>
  <div class="pill">Updated <strong id="hupdated">—</strong></div>
  <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
  <div class="ml">
    <span id="clock"></span>
    <button class="hbtn" id="mapbtn">🗺 Map</button>
    <button class="hbtn on">🖥 Control</button>
  </div>
</header>
<div class="body">
  <div class="sb">
    <div class="sbh"><span>Trains</span><span style="font-size:10px;color:#b8c8dc" id="sbcount">0</span></div>
    <div class="sbs"><input id="sbq" placeholder="Search…" oninput="renderList()"/></div>
    <div class="tl" id="tlist"></div>
  </div>
  <div class="cw" id="cwrap">
    <canvas id="sch"></canvas>
    <div class="zb">
      <button class="zz" onclick="zoom(1.25)">+</button>
      <button class="zz" onclick="zoom(0.8)">−</button>
      <button class="zz" onclick="resetView()" style="font-size:10px">⌂</button>
    </div>
  </div>
  <div class="inf">
    <div class="nos" id="nosel">Click a train<br/>or station</div>
    <div id="selc" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="isc" id="sel-hdr"></div>
      <div class="sl" id="sel-body"></div>
    </div>
  </div>
</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// BASE URL
// ─────────────────────────────────────────────────────────────────────────────
const API_BASE = (()=>{
  let path = location.pathname;
  if (!path.endsWith('/') && !path.split('/').pop().includes('.')) path += '/';
  return location.origin + path.substring(0, path.lastIndexOf('/') + 1) + 'api';
})();
document.getElementById('mapbtn').onclick = () => location.href = API_BASE.replace(/\/api$/, '/');

// ─────────────────────────────────────────────────────────────────────────────
// COLOURS
// ─────────────────────────────────────────────────────────────────────────────
const C={
  CAB:'#007b40', GOL:'#f5a400', FER:'#e3000f', AIR:'#f5a400',
  DOO:'#7b2d8b', SHO:'#00aeef', KCL:'#007b40',
  CLV:'#7b2d8b', IPL:'#007b40', SPR:'#00aeef', BEL:'#e3000f',
};

const PREFIX_TO_LINE={
  FG:'FER',CA:'CAB',GY:'CAB',NA:'CAB',RP:'KCL',KP:'KCL',
  SH:'SHO',AP:'AIR',BD:'AIR',DB:'DOO',BL:'GOL',BH:'GOL',BE:'GOL',
  VL:'GOL',CL:'CLV',IP:'IPL',RW:'IPL',SP:'SPR',SC:'SPR',
};
const CITY_CODES=new Set(['BR','BN','RO']);

const INNER_CITY=new Set(['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Northgate']);
function trainColour(v){
  const hs=(v.headsign||'').replace(/\s+station$/i,'');
  return INNER_CITY.has(hs)?'#4a5568':(v.colour||'#7a8899');
}

// ─────────────────────────────────────────────────────────────────────────────
// SCHEMATIC LINE DEFINITIONS
// Each line: row, dx (+1=right / -1=left), col, and the definitive ordered
// stop list (Roma Street first, terminus last).
// Stop order is hardcoded from the SEQ rail network — this is stable geography.
// The backend confirms which stops are active; positions are fixed here.
// ─────────────────────────────────────────────────────────────────────────────
const LINES=[
  // ── RIGHT branches (above centre, row < 0) ──────────────────────────────
  { id:'FER', row:-4, dx:+1, col:C.FER,
    junction:'Bowen Hills',
    stops:['Windsor','Wilston','Newmarket','Alderley','Enoggera','Gaythorne',
           'Mitchelton','Oxford Park','Grovely','Keperra','Ferny Grove'] },
  { id:'DOO', row:-3, dx:+1, col:C.DOO,
    junction:'Eagle Junction',
    stops:['Clayfield','Hendra','Ascot','Doomben'] },
  { id:'AIR', row:-2, dx:+1, col:C.AIR,
    junction:'Eagle Junction',
    stops:['Domestic Airport','International Airport'] },
  { id:'SHO', row:-1, dx:+1, col:C.SHO,
    junction:'Northgate',
    stops:['Bindha','Banyo','Nudgee','Boondall','North Boondall',
           'Deagon','Sandgate','Shorncliffe'] },
  // ── Main spines (row 0) ─────────────────────────────────────────────────
  { id:'CAB', row:0, dx:+1, col:C.CAB, junction:null,
    stops:['Roma Street','Central','Fortitude Valley','Bowen Hills',
           'Wooloowin','Albion','Eagle Junction',
           'Nundah','Toombul','Northgate',
           'Virginia','Sunshine','Geebung','Zillmere','Carseldine','Bald Hills',
           'Dakabin','Strathpine','Lawnton','Petrie','Narangba','Burpengary',
           'Morayfield','Caboolture','Elimbah','Beerburrum','Glasshouse Mountains',
           'Beerwah','Landsborough','Woombye','Nambour','Yandina','Eumundi',
           'Cooroy','Cooran','Pomona','Traveston','Gympie North'] },
  { id:'GOL', row:0, dx:-1, col:C.GOL, junction:null,
    stops:['Roma Street','South Brisbane','South Bank','Boggo Road','Dutton Park',
           'Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury',
           'Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove',
           'Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania',
           'Edens Landing','Holmview','Beenleigh','Ormeau','Pimpama',
           'Coomera','Helensvale','Nerang','Robina','Varsity Lakes'] },
  // ── LEFT branches (below centre, row > 0) ───────────────────────────────
  { id:'CLV', row:+1, dx:-1, col:C.CLV,
    junction:'Boggo Road',
    stops:['Buranda','Coorparoo','Norman Park','Morningside','Cannon Hill','Murarrie',
           'Hemmant','Lindum','Wynnum North','Wynnum','Wynnum Central','Manly','Lota',
           'Thorneside','Birkdale','Wellington Point','Ormiston','Cleveland'] },
  { id:'KCL', row:+1, dx:+1, col:C.KCL,
    junction:'Petrie',
    stops:['Kallangur','Murrumba Downs','Mango Hill','Mango Hill East',
           'Rothwell','Kippa-Ring'] },
  { id:'IPL', row:+2, dx:-1, col:C.IPL, junction:null,
    stops:['Roma Street','Milton','Auchenflower','Toowong','Taringa','Indooroopilly',
           'Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra','Wacol','Gailes',
           'Goodna','Redbank','Riverview','Dinmore','Ebbw Vale','Bundamba','Booval',
           'East Ipswich','Ipswich','Thomas Street','Wulkuraka','Karrabin',
           'Walloon','Thagoona','Rosewood'] },
  { id:'SPR', row:+3, dx:-1, col:C.SPR,
    junction:'Darra',
    stops:['Richlands','Springfield','Springfield Central'] },
];

// ─────────────────────────────────────────────────────────────────────────────
// LAYOUT ENGINE
// ─────────────────────────────────────────────────────────────────────────────
let canW=0, canH=0, vp={x:0,y:0,scale:1};
let drawSegs=[], linePts={};
let U_last=56;
let allRailStops={};  // {line_id:[{name,...}]} from API — used only to confirm stop existence
const stationX={};    // stopName -> schematic x on row 0 (or rowN for branches)

function buildLayout(W,H){
  drawSegs=[];
  for(const k in linePts) delete linePts[k];
  for(const k in stationX) delete stationX[k];
  placeAllStops();
}

function placeAllStops(){
  for(const k in linePts) delete linePts[k];
  for(const k in stationX) delete stationX[k];
  const U=U_last;
  const stationPos={};

  // Pass 1: spine lines (junction===null).
  // Row 0 spines (CAB, GOL): Roma Street at x=0, stops spread left or right at U each.
  // Off-row spines (IPL row+2): leave a 45° diagonal from Roma (0,0) to the
  // row start, then spread stops from there. The diagonal has equal x and y step
  // so it's always 45°. IPL goes left (dx=-1) so the diagonal goes to (-row*U, row*U).
  for(const line of LINES){
    if(line.junction!==null) continue;
    const y=line.row*U;
    let startX=0;
    if(line.row!==0){
      // 45° entry: start x = dx * |row| * U  (equal horizontal and vertical offset)
      startX=line.dx*Math.abs(line.row)*U;
      drawSegs.push({x1:0,y1:0,x2:startX,y2:y,col:line.col});
    }
    // Place stops evenly from startX along dx
    const pts=line.stops.map((name,i)=>({name, x:startX+line.dx*i*U, y}));
    linePts[line.id]=pts;
    for(const p of pts){
      stationX[p.name]=stationX[p.name]??p.x;
      stationPos[p.name]=stationPos[p.name]??{x:p.x,y:p.y};
    }
    if(pts.length>1)
      drawSegs.push({x1:pts[0].x,y1:y,x2:pts[pts.length-1].x,y2:y,col:line.col});
  }

  // Pass 2: branch lines.
  // x-offset of first stop = dx * |rowDiff| * U  so diagonal is always 45°.
  for(const line of LINES){
    if(line.junction===null) continue;
    const y=line.row*U;
    const jp=stationPos[line.junction]??{x:0,y:0};
    const rowDiff=Math.abs(line.row*U - jp.y)/U;  // rows between junction and branch
    const x0=jp.x+line.dx*Math.max(1,rowDiff)*U;
    const pts=line.stops.map((name,i)=>({name, x:x0+line.dx*i*U, y}));
    linePts[line.id]=pts;
    for(const p of pts) stationPos[p.name]=stationPos[p.name]??{x:p.x,y:p.y};
    if(!pts.length) continue;
    drawSegs.push({x1:jp.x,y1:jp.y,x2:pts[0].x,y2:y,col:line.col});
    if(pts.length>1)
      drawSegs.push({x1:pts[0].x,y1:y,x2:pts[pts.length-1].x,y2:y,col:line.col});
  }
}


async function loadRailStops(){
  try{
    const r=await fetch(API_BASE+'/rail_stops');
    const d=await r.json();
    if(!d.loaded){setTimeout(loadRailStops,5000);return;}
    allRailStops=d.stops||{};
    placeAllStops();
    draw();
  }catch(e){console.warn('rail_stops failed:',e);setTimeout(loadRailStops,10000);}
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEWPORT
// ─────────────────────────────────────────────────────────────────────────────
function toContent(px,py){ return[(px-vp.x)/vp.scale,(py-vp.y)/vp.scale]; }
function centreRoma(){ vp.x=canW*0.35; vp.y=canH/2; }
function resetView(){ vp={x:0,y:0,scale:1}; centreRoma(); draw(); }
function zoom(f,px,py){
  const cv=document.getElementById('sch');
  px=px??cv.width/2; py=py??cv.height/2;
  const[wx,wy]=toContent(px,py);
  vp.scale=Math.max(.08,Math.min(12,vp.scale*f));
  vp.x=px-wx*vp.scale; vp.y=py-wy*vp.scale;
  draw();
}

// ─────────────────────────────────────────────────────────────────────────────
// TRAIN POSITIONING — stop-name matching, route-code fallback
// ─────────────────────────────────────────────────────────────────────────────
const nn=s=>s.toLowerCase()
  .replace(/\s*\(\w+\)$/,'')
  .replace(/,?\s*platform\s*\d+\s*$/i,'')
  .replace(/\s+station$/i,'').trim();

function findInPts(pts, cur, nxt){
  let ni=-1, ci=-1;
  // Exact match, or single-word prefix match only (avoids 'Sunnybank' matching 'Sunnybank Hills')
  const match=(sn,q)=>q&&(sn===q||(
    !sn.includes(' ')&&!q.includes(' ')&&(sn.startsWith(q)||q.startsWith(sn))
  ));
  for(let i=0;i<pts.length;i++){
    const sn=nn(pts[i].name);
    if(ni<0&&match(sn,nxt)) ni=i;
    if(ci<0&&match(sn,cur)) ci=i;
  }
  return{ni,ci};
}

function trainPos(v){
  const cur=nn(v.current_stop_name||'');
  const nxt=nn(v.next_stops?.[0]?.stop_name||'');

  // Step 1: find line whose stops contain current/next stop (most reliable)
  let bestPts=null, bestScore=0;
  for(const[lid,pts] of Object.entries(linePts)){
    if(!pts.length) continue;
    const{ni,ci}=findInPts(pts,cur,nxt);
    const score=(ci>=0?2:0)+(ni>=0?1:0);
    if(score>bestScore){ bestScore=score; bestPts=pts; }
  }

  // Step 2: route-code fallback if no stop match
  if(!bestPts||bestScore===0){
    const code=(v.route_id||'').toUpperCase().split('-')[0];
    let lid=null;
    if(code.length>=4){
      const orig=code.slice(0,2), dest=code.slice(2,4);
      lid = (!CITY_CODES.has(dest) && PREFIX_TO_LINE[dest])
          ||(!CITY_CODES.has(orig) && PREFIX_TO_LINE[orig])
          || PREFIX_TO_LINE[dest] || PREFIX_TO_LINE[orig];
      if(!lid && CITY_CODES.has(orig) && CITY_CODES.has(dest)) lid='GOL';
    }
    bestPts = linePts[lid||'CAB'] || linePts['CAB'] || [];
  }

  const pts=bestPts;
  if(!pts||!pts.length) return{x:0,y:0};
  const{ni,ci}=findInPts(pts,cur,nxt);
  if(ni<0&&ci<0) return pts[Math.floor(pts.length/2)]||{x:0,y:0};
  if(v.current_status==='STOPPED_AT'||ni<0) return pts[ci>=0?ci:0]||pts[0];
  const fi=ci>=0?ci:Math.max(0,ni-1);
  if(fi===ni) return pts[ni];
  const a=pts[Math.min(fi,pts.length-1)], b=pts[Math.min(ni,pts.length-1)];
  return{x:(a.x+b.x)/2, y:(a.y+b.y)/2};
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────────────────────────────
const LW=4.5, SR=4.5;

// Terminal and junction stops for dot styling — derived from LINES definition
const termini=new Set(), wpCol={};
for(const line of LINES){
  const stops=allRailStops[line.id]||[];
  if(stops.length) termini.add(stops[stops.length-1].name);
  // Junction stops get line colour
  if(line.junction) wpCol[line.junction.trunk]=wpCol[line.junction.trunk]||line.col;
  if(stops.length) wpCol[line.first]=line.col;
}

function draw(){
  const cv=document.getElementById('sch'), ctx=cv.getContext('2d');
  ctx.clearRect(0,0,canW,canH);
  ctx.fillStyle='#0b0d10'; ctx.fillRect(0,0,canW,canH);

  // Dot grid
  ctx.fillStyle='rgba(255,255,255,0.02)';
  for(let x=24;x<canW;x+=24)
    for(let y=24;y<canH;y+=24){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}

  ctx.save(); ctx.translate(vp.x,vp.y); ctx.scale(vp.scale,vp.scale);
  ctx.lineCap='round'; ctx.lineJoin='round';

  // ── Track segments ──────────────────────────────────────────────────────
  for(const seg of drawSegs){
    ctx.strokeStyle=seg.col;
    ctx.lineWidth=LW/vp.scale;
    ctx.globalAlpha=0.9;
    ctx.beginPath(); ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2); ctx.stroke();
  }
  ctx.globalAlpha=1;

  // ── Station dots + labels ───────────────────────────────────────────────
  // Draw all stops from linePts (API-sourced, with interpolated positions)
  const drawn=new Set(); // avoid drawing same name twice
  const lblX={};

  // Collect all stops across all lines for drawing
  const allStops=[];
  for(const[lid,pts] of Object.entries(linePts)){
    for(const p of pts){
      if(!drawn.has(p.name)&&p.x!==undefined){
        drawn.add(p.name); allStops.push({...p,lid});
      }
    }
  }
  allStops.sort((a,b)=>a.x-b.x);

  for(const{name,x,y,lid}of allStops){
    if(name==='Roma Street') continue;
    const clean=name.replace(/\s*\(\w+\)$/,'').replace(/\s+[Ss]tation$/i,'');
    // Is this a waypoint (junction/terminus)?
    const isWP=wpCol[name]!==undefined||wpCol[name.replace(/\s*\(\w+\)$/,'')]!==undefined;
    const isT=termini.has(name)||termini.has(name.replace(/\s*\(\w+\)$/,''));
    const col=wpCol[name]||wpCol[name.replace(/\s*\(\w+\)$/,'')]||C[lid]||'#888';
    const r=(isT?SR+1:isWP?SR*0.85:SR*0.65)/vp.scale, lw=1.5/vp.scale;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    if(isT){ ctx.fillStyle=col; ctx.fill(); ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=lw; ctx.stroke(); }
    else    { ctx.fillStyle='#111928'; ctx.fill(); ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.stroke(); }

    const sx=x*vp.scale+vp.x, sy=y*vp.scale+vp.y;
    if(sx<-80||sx>canW+80||sy<-40||sy>canH+40) continue;
    if(!isWP&&vp.scale<0.45) continue;
    if(isWP&&vp.scale<0.15) continue;

    const above=y<-0.1?true:y>0.1?false:(Math.round(x/U_last/2)%2===0);
    const rowKey=`${Math.round(y/U_last*10)}_${above?'a':'b'}`;
    const lastX=lblX[rowKey]??-99999;
    const minGap=isT?20:isWP?30:42;
    if(!isT&&(sx-lastX)<minGap) continue;
    lblX[rowKey]=sx;

    const fs=Math.max(7,(isT?9.5:isWP?8.5:7.5)/vp.scale);
    ctx.fillStyle=isT?col:isWP?'#8ab0cc':'#4a6888';
    ctx.font=`${isT||isWP?'600 ':''}${fs}px -apple-system,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline=above?'bottom':'top';
    ctx.fillText(clean,x,y+(above?-1:1)*(r+2.5/vp.scale));
  }

  // ── Roma Street hub ─────────────────────────────────────────────────────
  {
    const r=10/vp.scale, lw=2/vp.scale;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle='#1a2535'; ctx.fill();
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=lw; ctx.stroke();
    if(vp.scale>0.15){
      ctx.fillStyle='#fff';
      ctx.font=`bold ${Math.max(7,9/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('Roma St',0,0);
    }
  }

  // ── Trains ───────────────────────────────────────────────────────────────
  for(const v of vehicles){
    const pos=animPos(v), col=trainColour(v);
    const sel=selType==='train'&&selId===v.id;
    const delay=v.delay_seconds||0;
    const TW=(sel?38:30)/vp.scale, TH=(sel?16:12)/vp.scale, rx=3/vp.scale;
    const{x,y}=pos;

    // Glow
    const gr=ctx.createRadialGradient(x,y,0,x,y,TH*4);
    gr.addColorStop(0,col+'66'); gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(x,y,TH*4,0,Math.PI*2); ctx.fill();

    // Selection ring
    if(sel){
      const p=.4+.3*Math.abs(Math.sin(Date.now()/350));
      ctx.beginPath(); ctx.arc(x,y,TH*2.5,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=2.5/vp.scale; ctx.globalAlpha=p; ctx.stroke(); ctx.globalAlpha=1;
    }

    // Alert ring (not when selected — selected already has a ring)
    if(v.stopped_alert&&!sel){
      ctx.beginPath(); ctx.arc(x,y,TH*1.6,0,Math.PI*2);
      ctx.strokeStyle='#ff4444'; ctx.lineWidth=2/vp.scale;
      ctx.globalAlpha=0.5+0.4*Math.abs(Math.sin(Date.now()/600));
      ctx.stroke(); ctx.globalAlpha=1;
    }

    // Body (with drop shadow)
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=8/vp.scale;
    ctx.beginPath();
    ctx.moveTo(x-TW/2+rx,y-TH/2); ctx.lineTo(x+TW/2-rx,y-TH/2);
    ctx.arcTo(x+TW/2,y-TH/2,x+TW/2,y-TH/2+rx,rx); ctx.lineTo(x+TW/2,y+TH/2-rx);
    ctx.arcTo(x+TW/2,y+TH/2,x+TW/2-rx,y+TH/2,rx); ctx.lineTo(x-TW/2+rx,y+TH/2);
    ctx.arcTo(x-TW/2,y+TH/2,x-TW/2,y+TH/2-rx,rx); ctx.lineTo(x-TW/2,y-TH/2+rx);
    ctx.arcTo(x-TW/2,y-TH/2,x-TW/2+rx,y-TH/2,rx); ctx.closePath();
    ctx.fillStyle=col; ctx.fill(); ctx.restore();
    // Border
    ctx.beginPath();
    ctx.moveTo(x-TW/2+rx,y-TH/2); ctx.lineTo(x+TW/2-rx,y-TH/2);
    ctx.arcTo(x+TW/2,y-TH/2,x+TW/2,y-TH/2+rx,rx); ctx.lineTo(x+TW/2,y+TH/2-rx);
    ctx.arcTo(x+TW/2,y+TH/2,x+TW/2-rx,y+TH/2,rx); ctx.lineTo(x-TW/2+rx,y+TH/2);
    ctx.arcTo(x-TW/2,y+TH/2,x-TW/2,y+TH/2-rx,rx); ctx.lineTo(x-TW/2,y-TH/2+rx);
    ctx.arcTo(x-TW/2,y-TH/2,x-TW/2+rx,y-TH/2,rx); ctx.closePath();
    ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.5)';
    ctx.lineWidth=(sel?2.5:1.5)/vp.scale; ctx.stroke();
    // Highlight stripe
    ctx.fillStyle='rgba(255,255,255,.2)';
    ctx.beginPath(); ctx.rect(x-TW/2+rx,y-TH/2,TW-rx*2,TH*0.35); ctx.fill();
    // Late stripe
    if(delay>60){ ctx.fillStyle='#cc1111'; ctx.fillRect(x-TW/2,y-TH/2,5/vp.scale,TH); }
    // Direction arrow — use schematic movement vector; fall back to line dx
    {
      const s=animState[v.id];
      let adx=0,ady=0;
      if(s&&Math.hypot(s.toX-s.fromX,s.toY-s.fromY)>0.5){
        // Use the actual schematic animation direction
        const len=Math.hypot(s.toX-s.fromX,s.toY-s.fromY);
        adx=(s.toX-s.fromX)/len; ady=(s.toY-s.fromY)/len;
      } else {
        // Fall back to the line's dx direction (always horizontal: left or right)
        const pos=animPos(v);
        // Find which line this train is on by checking which linePts it's closest to
        let bestLine=null,bestD=Infinity;
        for(const[lid,pts] of Object.entries(linePts)){
          for(const p of pts){
            const d=Math.hypot(pos.x-p.x,pos.y-p.y);
            if(d<bestD){bestD=d;bestLine=lid;}
          }
        }
        // Use the line's dx for direction
        const linedef=LINES.find(l=>l.id===bestLine);
        adx=linedef?linedef.dx:(pos.x>=0?+1:-1);
        ady=0;
      }
      if(adx!==0||ady!==0){
        const aw=TH*0.7, al=TH*0.9;
        const tip={x:x+adx*(TW/2+al), y:y+ady*(TW/2+al)};
        const bx=x+adx*(TW/2), by=y+ady*(TW/2);
        const px=-ady*aw/2, py=adx*aw/2;
        ctx.beginPath();
        ctx.moveTo(tip.x,tip.y);
        ctx.lineTo(bx+px,by+py);
        ctx.lineTo(bx-px,by-py);
        ctx.closePath();
        ctx.fillStyle=col; ctx.fill();
        ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.5)';
        ctx.lineWidth=(sel?2:1)/vp.scale; ctx.stroke();
      }
    }
    // Label
    if(vp.scale>0.25){
      ctx.fillStyle='#fff';
      ctx.font=`bold ${Math.max(7,(sel?10:8)/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText((v.route_id||'').slice(0,3),x,y+.5/vp.scale);
    }
    if(delay>60&&vp.scale>0.35){
      ctx.fillStyle='#ff8888';
      ctx.font=`bold ${Math.max(6,6/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(`+${Math.round(delay/60)}m`,x,y-TH/2-2/vp.scale);
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────────────────────────────────────
let dragging=false, dragS={}, vpS={}, selId=null, selType=null, vehicles=[];

function hitTest(cx,cy){
  const tr=14/vp.scale;
  for(const v of vehicles){ const p=animPos(v); if(Math.hypot(cx-p.x,cy-p.y)<tr) return{t:'train',v}; }
  const sr=10/vp.scale;
  for(const pts of Object.values(linePts))
    for(const p of pts)
      if(Math.hypot(cx-p.x,cy-p.y)<sr) return{t:'station',n:p.name};
  return null;
}
function handleHit(h){
  if(h.t==='train'){
    if(selId===h.v.id&&selType==='train'){clearD();return;}
    selId=h.v.id; selType='train'; renderList(); showTrain(h.v);
  } else { selId=h.n; selType='station'; renderList(); showStation(h.n); }
}

const sch=document.getElementById('sch');
let _downX=0,_downY=0,_hitOnDown=false;
sch.addEventListener('mousedown',e=>{
  _downX=e.clientX; _downY=e.clientY;
  const[cx,cy]=toContent(e.offsetX,e.offsetY);
  const h=hitTest(cx,cy);
  _hitOnDown=!!h;
  if(h){ handleHit(h); return; }
  dragging=true; dragS={x:e.clientX,y:e.clientY}; vpS={x:vp.x,y:vp.y};
});
sch.addEventListener('mousemove',e=>{ if(!dragging)return; vp.x=vpS.x+(e.clientX-dragS.x); vp.y=vpS.y+(e.clientY-dragS.y); draw(); });
sch.addEventListener('mouseup',e=>{
  const moved=Math.hypot(e.clientX-_downX,e.clientY-_downY)>4;
  dragging=false;
  // Deselect only when clicking blank space (no hit on down, no drag)
  if(!moved&&!_hitOnDown&&(selId||selType)){clearD();renderList();draw();}
});
sch.addEventListener('mouseleave',()=>dragging=false);
sch.addEventListener('wheel',e=>{ e.preventDefault(); zoom(e.deltaY<0?1.12:.89,e.offsetX,e.offsetY); },{passive:false});
let _tDown={};
sch.addEventListener('touchstart',e=>{
  if(e.touches.length===1){_tDown={x:e.touches[0].clientX,y:e.touches[0].clientY};}
},{passive:true});
sch.addEventListener('touchend',e=>{
  if(e.changedTouches.length===1&&_tDown.x!==undefined){
    const t=e.changedTouches[0];
    const moved=Math.hypot(t.clientX-_tDown.x,t.clientY-_tDown.y)>8;
    if(!moved){
      const rect=sch.getBoundingClientRect();
      const[cx,cy]=toContent(t.clientX-rect.left,t.clientY-rect.top);
      const h=hitTest(cx,cy);
      if(h) handleHit(h);
      else if(selId||selType){clearD();renderList();draw();}
    }
  }
},{passive:true});

// ─────────────────────────────────────────────────────────────────────────────
// PANELS
// ─────────────────────────────────────────────────────────────────────────────
function clearD(){ selId=null; selType=null; document.getElementById('nosel').style.display='flex'; document.getElementById('selc').style.display='none'; }
function openD(){ document.getElementById('nosel').style.display='none'; document.getElementById('selc').style.display='flex'; }
function mkrows(a){ return a.map(([l,v,c])=>`<div class="ir"><span class="lb">${l}</span><span class="vl ${c||''}">${v}</span></div>`).join(''); }

function showTrain(v){
  openD();
  const d=v.delay_seconds||0;
  const ds=d===0?'On Time':d>0?`+${Math.round(d/60)}m late`:`${Math.round(d/60)}m early`;
  const dc=d>60?'warn':d<-30?'info':'ok';
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const hd=v.bearing?dirs[Math.round(v.bearing/45)%8]+` ${v.bearing}°`:'—';
  const sn=v.current_stop_name?(v.current_status==='STOPPED_AT'?'At ':'To ')+v.current_stop_name.replace(/,?\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,''):v.current_status?.replace(/_/g,' ')||'—';
  document.getElementById('sel-hdr').innerHTML=`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <div style="width:10px;height:10px;border-radius:2px;background:${trainColour(v)}"></div>
      <div style="font-weight:700;font-size:11px;color:#e8f0fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.route_id||'—'} → ${v.headsign||'—'}</div>
    </div>
    ${mkrows([['Train',v.label||v.id,''],['Status',sn,''],['Delay',ds,dc],['Speed',v.speed?v.speed+' km/h':'—',''],['Heading',hd,'']])}`;
  const alertHtml=v.stopped_alert?`<div style="background:#3d0a0a;border:1px solid #a03030;border-radius:4px;padding:4px 8px;margin-bottom:6px;font-size:10px;color:#ff9999">⚠ ${v.stopped_alert}</div>`:'';
  const stops=v.next_stops||[];
  document.getElementById('sel-body').innerHTML=alertHtml+`<div class="itl">Next Stops</div>${stops.length?stops.map((s,i)=>{
    const nm=(s.stop_name||s.stop_id).replace(/,\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,'');
    const d2=s.arrival_delay; let ds2='';
    if(d2!=null){ if(Math.abs(d2-d)>=60) ds2=d2>0?`+${Math.round(d2/60)}m`:`${Math.round(d2/60)}m`; }
    return`<div class="sr"><div class="sn">${i+1}</div><div class="sm">${nm}</div><div class="sd ${d2>60?'late':'ok'}">${ds2}</div></div>`;
  }).join(''):'<div style="color:#3a4a5e;font-size:10px">No data</div>'}`;
}

function minsUntil(t){ if(!t)return''; const m=Math.round((t-Date.now()/1000)/60); return m<=0?'Now':`${m}m`; }

function showStation(name){
  openD();
  document.getElementById('sel-hdr').innerHTML=`<div class="itl">Station</div><div style="font-weight:700;font-size:11px;color:#e8f0fa">${name}</div>`;
  const normalize=s=>s.toLowerCase().replace(/,?\s*platform\s*\d+\s*$/i,'').replace(/\s+station$/i,'').trim();
  const ns=normalize(name), arr=[];
  for(const v of vehicles) for(const s of v.next_stops||[]){
    const sn=normalize(s.stop_name||'');
    if(sn===ns||sn.startsWith(ns.split(' ')[0])||ns.startsWith(sn.split(' ')[0])){
      const delay=s.arrival_delay||0;
      arr.push({vid:v.id,route_id:v.route_id,headsign:v.headsign||v.label,delay,arr_time:(s.arrival_time||0)+delay,col:trainColour(v)});
    }
  }
  arr.sort((a,b)=>(a.arr_time||0)-(b.arr_time||0));
  document.getElementById('sel-body').innerHTML=`<div class="itl">Next Arrivals</div>${arr.length?arr.slice(0,8).map(a=>{
    const mins=minsUntil(a.arr_time), ds=a.delay===0?'':a.delay>0?`+${Math.round(a.delay/60)}m`:`${Math.round(a.delay/60)}m`;
    return`<div class="ar" onclick="selectTrain('${a.vid}')">
      <div class="ab" style="background:${a.col}">${(a.route_id||'').slice(0,3)}</div>
      <div class="ad">${a.headsign||'—'}</div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-weight:700;font-size:11px;color:${mins==='Now'?'#ff8844':'#e8f0fa'}">${mins}</div>
        ${ds?`<div style="font-size:8px;color:${a.delay>60?'#ff4444':'#3ddc84'}">${ds}</div>`:''}
      </div>
    </div>`;
  }).join(''):'<div style="color:#3a4a5e;font-size:10px">No arrivals</div>'}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────────────────────
function renderList(){
  const q=document.getElementById('sbq').value.toLowerCase();
  const s=[...vehicles]
    .filter(v=>!q||(v.route_id||'').toLowerCase().includes(q)||(v.headsign||'').toLowerCase().includes(q)||(v.line_name||'').toLowerCase().includes(q))
    .sort((a,b)=>(b.delay_seconds||0)-(a.delay_seconds||0));
  const dc=d=>d>60?'late':d<-30?'early':'ok';
  const dl=d=>d>60?`+${Math.round(d/60)}m`:d<-30?`${Math.round(d/60)}m`:'On time';
  document.getElementById('tlist').innerHTML=s.length?s.map(v=>{
    const d=v.delay_seconds||0, sel=selType==='train'&&selId===v.id, bc=trainColour(v);
    const alert=v.stopped_alert?`<span style="color:#ff6060;font-weight:700" title="${v.stopped_alert}"> ⚠</span>`:'';
    return`<div class="en ${sel?'sel':''}" onclick="selectTrain('${v.id}')">
      <div class="et">
        <span class="rb" style="background:${bc}">${(v.headsign||v.route_id||'—').replace(/\s+[Ss]tation$/i,'').slice(0,18)}${alert}</span>
        <span class="dtg ${dc(d)}">${dl(d)}</span>
      </div>
      <div class="em">${v.current_stop_name?'→ '+v.current_stop_name.replace(/\s+[Ss]tation$/i,'').slice(0,20):''}</div>
    </div>`;
  }).join(''):`<div style="color:#3a4a5e;padding:12px;text-align:center;font-size:10px">No trains</div>`;
}
function selectTrain(id){
  const v=vehicles.find(x=>x.id===id); if(!v)return;
  if(selId===id&&selType==='train'){clearD();return;}
  selId=id; selType='train'; renderList(); showTrain(v);
}

// ─────────────────────────────────────────────────────────────────────────────
// ANIMATION
// ─────────────────────────────────────────────────────────────────────────────
const animState={};
let lastTick=null;

function syncAnimTargets(){
  for(const v of vehicles){
    const target=trainPos(v), s=animState[v.id];
    if(!s){
      animState[v.id]={x:target.x,y:target.y,fromX:target.x,fromY:target.y,toX:target.x,toY:target.y,progress:1};
    } else if(Math.hypot(target.x-s.toX,target.y-s.toY)>0.5){
      s.fromX=s.x; s.fromY=s.y; s.toX=target.x; s.toY=target.y; s.progress=0;
    }
  }
}

function animPos(v){
  const s=animState[v.id];
  return s||trainPos(v);
}

function animTick(ts){
  const dt=lastTick?Math.min((ts-lastTick)/1000,0.5):0.016;
  lastTick=ts;
  const step=dt/13;
  for(const v of vehicles){
    const s=animState[v.id];
    if(!s||s.progress>=1) continue;
    s.progress=Math.min(1,s.progress+step);
    s.x=s.fromX+(s.toX-s.fromX)*s.progress;
    s.y=s.fromY+(s.toY-s.fromY)*s.progress;
  }
  draw();
  requestAnimationFrame(animTick);
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
async function refresh(){
  try{
    const r=await fetch(API_BASE+'/vehicles'), d=await r.json();
    vehicles=d.vehicles||[];
    syncAnimTargets();
    const late=vehicles.filter(v=>(v.delay_seconds||0)>60).length;
    document.getElementById('hcount').textContent=d.count||0;
    document.getElementById('hlate').textContent=late;
    document.getElementById('sbcount').textContent=d.count||0;
    const age=d.last_updated?Math.round(Date.now()/1000-d.last_updated):null;
    document.getElementById('hupdated').textContent=age!=null?`${age}s ago`:'—';
    renderList();
    if(selType==='train'&&selId){ const v=vehicles.find(x=>x.id===selId); if(v)showTrain(v); else clearD(); }
  }catch{ document.getElementById('sled').classList.add('red'); }
}

setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
},1000);

function resize(){
  const c=document.getElementById('sch'), w=document.getElementById('cwrap');
  c.width=w.clientWidth; c.height=w.clientHeight; canW=c.width; canH=c.height;
  buildLayout(canW,canH); centreRoma(); draw();
}
window.addEventListener('resize',resize);

function toggleSidebar(){
  const sb=document.querySelector('.sb'), btn=document.getElementById('sidebar-toggle');
  const collapsed=sb.classList.toggle('collapsed');
  btn.textContent=collapsed?'▶':'☰';
  btn.title=collapsed?'Open sidebar':'Close sidebar';
}
if(window.innerWidth<768){
  document.querySelector('.sb').classList.add('collapsed');
  const btn=document.getElementById('sidebar-toggle');
  if(btn){ btn.textContent='▶'; btn.title='Open sidebar'; }
}

resize();
loadRailStops();
refresh().then(()=>requestAnimationFrame(animTick));
setInterval(refresh,15000);

</script>
