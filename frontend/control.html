<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SEQ Rail Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0b0d10;color:#b8c8dc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}
header{height:40px;background:#10141a;border-bottom:1px solid #1e2738;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.logo{font-weight:700;font-size:13px;color:#e8f0fa;}.logo span{color:#3a4a5e;font-weight:400;}
.pill{background:#161b23;border:1px solid #1e2738;border-radius:4px;padding:2px 9px;font-size:11px;color:#3a4a5e;display:flex;align-items:center;gap:5px;}
.pill .led{width:5px;height:5px;border-radius:50%;background:#3ddc84;}.pill .led.red{background:#ff4444;}.pill strong{color:#b8c8dc;}
.ml{margin-left:auto;display:flex;gap:6px;align-items:center;}
.hbtn{background:#161b23;border:1px solid #1e2738;border-radius:4px;padding:3px 11px;font-size:11px;font-family:inherit;color:#3a4a5e;cursor:pointer;}
.hbtn:hover{color:#b8c8dc;}.hbtn.on{background:#152030;border-color:#2a5080;color:#6aa8e0;}
#clock{font-size:11px;color:#3a4a5e;font-variant-numeric:tabular-nums;}
.body{display:flex;flex:1;overflow:hidden;}
.sb{width:180px;background:#10141a;border-right:1px solid #1e2738;display:flex;flex-direction:column;flex-shrink:0;transition:width 0.25s ease,opacity 0.25s ease;}
.sb.collapsed{width:0;opacity:0;pointer-events:none;border-right:none;}
#sidebar-toggle{background:none;border:1px solid #1e2738;border-radius:4px;color:#3a4a5e;cursor:pointer;font-size:0.9rem;padding:3px 8px;line-height:1;}
#sidebar-toggle:hover{background:#1e2738;color:#b8c8dc;}
.sbh{padding:6px 8px;border-bottom:1px solid #1e2738;display:flex;justify-content:space-between;align-items:center;}
.sbh span{font-size:9px;font-weight:600;color:#3a4a5e;text-transform:uppercase;letter-spacing:1px;}
.sbs{padding:4px 6px;border-bottom:1px solid #1e2738;}
.sbs input{width:100%;background:#0b0d10;border:1px solid #1e2738;border-radius:3px;color:#b8c8dc;font-family:inherit;font-size:11px;padding:3px 6px;outline:none;}
.sbs input:focus{border-color:#2a5080;}.sbs input::placeholder{color:#3a4a5e;}
.tl{overflow-y:auto;flex:1;padding:3px;}
.en{border-radius:3px;padding:4px 6px;margin-bottom:2px;cursor:pointer;border:1px solid transparent;}
.en:hover{background:#161b23;}.en.sel{background:#0e1e30;border-color:#2a5080;}
.et{display:flex;justify-content:space-between;align-items:center;}
.rb{font-size:8px;padding:1px 4px;border-radius:2px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.dtg{font-size:8px;padding:1px 3px;border-radius:2px;font-weight:600;flex-shrink:0;}
.dtg.ok{background:#0a1f12;color:#3ddc84;}.dtg.late{background:#1f0a0a;color:#ff4444;}.dtg.early{background:#0a0f1f;color:#4488ff;}
.em{font-size:8px;color:#3a4a5e;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cw{flex:1;position:relative;overflow:hidden;}
#sch{display:block;cursor:grab;}#sch:active{cursor:grabbing;}
.zb{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:3px;}
.zz{width:26px;height:26px;background:rgba(16,20,26,.95);border:1px solid #1e2738;color:#b8c8dc;font-size:15px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.zz:hover{background:#161b23;}
.inf{width:210px;background:#10141a;border-left:1px solid #1e2738;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.isc{padding:7px 9px;border-bottom:1px solid #1e2738;}
.itl{font-size:9px;font-weight:600;color:#3a4a5e;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.ir{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #0e1420;font-size:10px;}
.ir:last-child{border:none;}.ir .lb{color:#3a4a5e;}
.ir .vl{color:#b8c8dc;font-weight:500;text-align:right;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ir .vl.ok{color:#3ddc84;}.ir .vl.warn{color:#ff4444;}.ir .vl.info{color:#4488ff;}
.sl{overflow-y:auto;flex:1;padding:7px 9px;}
.sr{display:flex;align-items:center;gap:4px;padding:2px 0;border-bottom:1px solid #0e1420;font-size:10px;}
.sr:last-child{border:none;}
.sn{width:13px;height:13px;border-radius:50%;background:#161b23;border:1px solid #1e2738;display:flex;align-items:center;justify-content:center;font-size:7px;color:#3a4a5e;flex-shrink:0;}
.sm{flex:1;color:#b8c8dc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sd{font-size:8px;font-weight:600;}.sd.ok{color:#3ddc84;}.sd.late{color:#ff4444;}
.ar{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid #0e1420;font-size:10px;cursor:pointer;border-radius:2px;}
.ar:hover{background:#161b23;}.ar:last-child{border-bottom:none;}
.ab{width:28px;height:13px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0;}
.ad{flex:1;color:#b8c8dc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nos{flex:1;display:flex;align-items:center;justify-content:center;color:#3a4a5e;font-size:10px;text-align:center;line-height:2;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:#10141a;}::-webkit-scrollbar-thumb{background:#1e2738;border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="logo">SEQ Rail <span>/ Control</span></div>
  <div class="pill"><div class="led" id="sled"></div>Live <strong id="hcount">—</strong></div>
  <div class="pill"><strong id="hlate" style="color:#ff4444">—</strong> late</div>
  <div class="pill">Updated <strong id="hupdated">—</strong></div>
  <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
  <div class="ml">
    <span id="clock"></span>
    <button class="hbtn" id="mapbtn">🗺 Map</button>
    <button class="hbtn on">🖥 Control</button>
  </div>
</header>
<div class="body">
  <div class="sb">
    <div class="sbh"><span>Trains</span><span style="font-size:10px;color:#b8c8dc" id="sbcount">0</span></div>
    <div class="sbs"><input id="sbq" placeholder="Search…" oninput="renderList()"/></div>
    <div class="tl" id="tlist"></div>
  </div>
  <div class="cw" id="cwrap">
    <canvas id="sch"></canvas>
    <div class="zb">
      <button class="zz" onclick="zoom(1.25)">+</button>
      <button class="zz" onclick="zoom(0.8)">−</button>
      <button class="zz" onclick="resetView()" style="font-size:10px">⌂</button>
    </div>
  </div>
  <div class="inf">
    <div class="nos" id="nosel">Click a train<br/>or station</div>
    <div id="selc" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="isc" id="sel-hdr"></div>
      <div class="sl" id="sel-body"></div>
    </div>
  </div>
</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// BASE URL — works at root or any subfolder
// ─────────────────────────────────────────────────────────────────────────────
const API_BASE = (()=>{
  let path = location.pathname;
  if (!path.endsWith('/') && !path.split('/').pop().includes('.')) path += '/';
  return location.origin + path.substring(0, path.lastIndexOf('/') + 1) + 'api';
})();
document.getElementById('mapbtn').onclick = () => location.href = API_BASE.replace(/\/api$/, '/');

// ─────────────────────────────────────────────────────────────────────────────
// COLOURS
// ─────────────────────────────────────────────────────────────────────────────
const LINE_COLOURS={red:'#e3000f',green:'#007b40',gold:'#f5a400',blue:'#00aeef',purple:'#7b2d8b'};
const ROUTE_COLOUR_TABLE={
  FGBR:'red',BRFG:'red',BNFG:'red',FGBN:'red',BRBR:'red',BNBN:'red',BNBR:'red',BRBN:'red',BDBN:'red',BNBD:'red',
  BDVL:'gold',VLBD:'gold',BNVL:'gold',VLBN:'gold',BRVL:'gold',VLBR:'gold',
  BRAP:'gold',APBR:'gold',BNAP:'gold',APBN:'gold',BDAP:'gold',APBD:'gold',BRBD:'gold',BDBR:'gold',DBBR:'gold',
  BRSH:'blue',SHBR:'blue',BNSH:'blue',SHBN:'blue',BDSH:'blue',SHBD:'blue',
  RPSP:'blue',SPRP:'blue',BRSP:'blue',SPBR:'blue',BNSP:'blue',SPBN:'blue',
  BRDB:'purple',DBBN:'purple',BRCL:'purple',CLBR:'purple',BNCL:'purple',CLBN:'purple',
  BDCA:'green',CABD:'green',BNCA:'green',CABN:'green',BRCA:'green',CABR:'green',
  BRGY:'green',GYBR:'green',IPCA:'green',CAIP:'green',
  IPNA:'green',NAIP:'green',IPRW:'green',RWIP:'green',
  BRRW:'green',RWBR:'green',RPBR:'green',BRRP:'green',
};
const PFX2={FG:'red',BE:'red',VL:'gold',AP:'gold',SH:'blue',SP:'blue',DO:'purple',CL:'purple',CA:'green',NA:'green',GY:'green',IP:'green',RW:'green',RP:'green',KP:'green',IM:'green'};
function lc(rid){
  if(!rid)return'#5a6478';
  const code=rid.toUpperCase().split('-')[0];
  const name=ROUTE_COLOUR_TABLE[code]||PFX2[code.slice(0,2)];
  return name?LINE_COLOURS[name]:'#7a8899';
}
// Gray for inner-city trains terminating at/from Roma Street ↔ Northgate corridor
const INNER_CITY=new Set(['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Northgate']);
function trainColour(v){
  // Inner-city shuttle: headsign is within the city loop
  const hs=(v.headsign||'').replace(/\s+station$/i,'');
  if(INNER_CITY.has(hs)) return '#4a5568';
  return v.colour||lc(v.route_id);
}

// Official Translink SEQ line colours
const C={
  CAB:'#007b40', KCL:'#007b40', SHO:'#00aeef', AIR:'#f5a400',
  DOO:'#7b2d8b', FER:'#e3000f', BEL:'#e3000f', GOL:'#f5a400',
  CLV:'#7b2d8b', IPL:'#007b40', SPR:'#00aeef',
};

// ─────────────────────────────────────────────────────────────────────────────
// NETWORK TREE
//
// Y-slots (2U spacing prevents label/line crossings):
//  East corridor: y=0
//  Ferny Grove:   y=-2  (kink dy:-2 at Bowen Hills, then horizontal)
//  Shorncliffe:   y=-4  (kink dy:-4 at Eagle Jct, then horizontal)
//  Airport:       y=-6  (kink dy:-2 from Shorncliffe row at Albion, then horizontal)
//  Doomben:       y=-8  (kink dy:-8 at Eagle Jct, then horizontal)
//  Kippa-Ring:    y=-2  (kink dy:-2 at Petrie — far right, no x-overlap with FG)
//
//  Beenleigh/GC:  y=+2  (kink dy:+2 at Roma St, then horizontal)
//  Cleveland:     y=+4  (kink dy:+2 from Beenleigh row at Boggo Rd, then horizontal)
//  Ipswich/SPR:   y=+6  (kink dy:+6 at Roma St, then horizontal)
//  Springfield:   y=+8  (kink dy:+2 from Ipswich row at Darra, then horizontal)
// ─────────────────────────────────────────────────────────────────────────────
const TREE={
  stops:['Roma Street'],cols:[C.CAB,C.KCL,C.SHO,C.AIR,C.DOO,C.FER,C.BEL,C.GOL,C.CLV,C.IPL,C.SPR],dx:0,dy:0,
  children:[
    // ── EAST corridor y=0 ────────────────────────────────────────────────────
    {dx:1,dy:0,stops:['Central','Fortitude Valley','Bowen Hills'],cols:[C.CAB,C.KCL,C.SHO,C.AIR,C.DOO,C.FER],children:[
      // Ferny Grove: kink dy:-2 at Bowen Hills → y=-2, then horizontal east
      {dx:1,dy:-2,stops:['Windsor'],cols:[C.FER],children:[
        {dx:1,dy:0,stops:['Wilston','Newmarket','Alderley','Enoggera','Gaythorne','Mitchelton','Oxford Park','Grovely','Keperra','Ferny Grove'],cols:[C.FER],children:[]}
      ]},
      // Eagle Junction straight east y=0
      {dx:1,dy:0,stops:['Eagle Junction'],cols:[C.CAB,C.KCL,C.SHO,C.AIR,C.DOO],children:[
        // Shorncliffe: kink dy:-4 → y=-4, then horizontal
        {dx:1,dy:-4,stops:['Wooloowin'],cols:[C.SHO,C.AIR],children:[
          {dx:1,dy:0,stops:['Albion'],cols:[C.SHO,C.AIR],children:[
            // Shorncliffe continues east on y=-4
            {dx:1,dy:0,stops:['Bindha','Banyo','Nudgee','Boondall','North Boondall','Deagon','Sandgate','Shorncliffe'],cols:[C.SHO],children:[]},
            // Airport: kink dy:-2 from y=-4 → y=-6, then horizontal
            {dx:1,dy:-2,stops:['Domestic Airport'],cols:[C.AIR],children:[
              {dx:1,dy:0,stops:['International Airport'],cols:[C.AIR],children:[]}
            ]}
          ]}
        ]},
        // Doomben: kink dy:-8 → y=-8 (below Airport), then horizontal
        {dx:1,dy:-8,stops:['Clayfield'],cols:[C.DOO],children:[
          {dx:1,dy:0,stops:['Hendra','Ascot','Doomben'],cols:[C.DOO],children:[]}
        ]},
        // Main east Northgate→Petrie y=0
        {dx:1,dy:0,stops:['Northgate','Carseldine','Bald Hills','Strathpine','Lawnton','Petrie'],cols:[C.CAB,C.KCL],children:[
          // Caboolture: straight east y=0
          {dx:1,dy:0,stops:['Narangba','Burpengary','Morayfield','Caboolture','Elimbah','Beerburrum','Glasshouse Mountains','Beerwah','Landsborough','Woombye','Nambour','Gympie North'],cols:[C.CAB],children:[]},
          // Kippa-Ring: kink dy:-2 at Petrie → y=-2, then horizontal
          // (y=-2 same row as FG but far to the east — no x-overlap)
          {dx:1,dy:-2,stops:['Kallangur'],cols:[C.KCL],children:[
            {dx:1,dy:0,stops:['Murrumba Downs','Mango Hill','Mango Hill East','Rothwell','Kippa-Ring'],cols:[C.KCL],children:[]}
          ]}
        ]}
      ]}
    ]},
    // ── SOUTH: Beenleigh / Gold Coast / Cleveland ────────────────────────────
    // South corridor kinks dy:+2 from Roma St → y=+2, then horizontal west
    {dx:-1,dy:2,stops:['South Brisbane'],cols:[C.BEL,C.GOL,C.CLV],children:[
      {dx:-1,dy:0,stops:['South Bank','Boggo Road'],cols:[C.BEL,C.GOL,C.CLV],children:[
        // Cleveland: kink dy:+2 → y=+4, then horizontal west
        {dx:-1,dy:2,stops:['Buranda'],cols:[C.CLV],children:[
          {dx:-1,dy:0,stops:['Coorparoo','Norman Park','Morningside','Cannon Hill','Murarrie','Hemmant','Lindum','Wynnum North','Wynnum','Wynnum Central','Manly','Lota','Thorneside','Birkdale','Wellington Point','Ormiston','Cleveland'],cols:[C.CLV],children:[]}
        ]},
        // Beenleigh + GC: horizontal west on y=+2
        {dx:-1,dy:0,stops:['Dutton Park','Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury','Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove','Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania','Edens Landing','Holmview','Beenleigh'],cols:[C.BEL,C.GOL],children:[
          {dx:-1,dy:0,stops:['Ormeau','Pimpama','Coomera','Helensvale','Nerang','Robina','Varsity Lakes'],cols:[C.GOL],children:[]}
        ]}
      ]}
    ]},
    // ── WEST: Ipswich + Springfield ─────────────────────────────────────────
    // Kink dy:+6 → y=+6, then horizontal west
    {dx:-1,dy:6,stops:['Milton'],cols:[C.IPL,C.SPR],children:[
      {dx:-1,dy:0,stops:['Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra'],cols:[C.IPL,C.SPR],children:[
        // Ipswich: straight west on y=+6
        {dx:-1,dy:0,stops:['Wacol','Gailes','Goodna','Redbank','Riverview','Dinmore','Bundamba','Booval','Ipswich','Walloon','Rosewood'],cols:[C.IPL],children:[]},
        // Springfield: kink dy:+2 → y=+8, then horizontal west
        {dx:-1,dy:2,stops:['Richlands'],cols:[C.SPR],children:[
          {dx:-1,dy:0,stops:['Springfield','Springfield Central'],cols:[C.SPR],children:[]}
        ]}
      ]}
    ]}
  ]
};
// LINES for train positioning (full stop lists)
const LINES=[
  {id:'CAB',col:C.CAB,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Northgate','Carseldine','Bald Hills','Strathpine','Lawnton','Petrie','Narangba','Burpengary','Morayfield','Caboolture','Elimbah','Beerburrum','Glasshouse Mountains','Beerwah','Landsborough','Woombye','Nambour','Gympie North']},
  {id:'KCL',col:C.KCL,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Northgate','Carseldine','Bald Hills','Strathpine','Lawnton','Petrie','Kallangur','Murrumba Downs','Mango Hill','Mango Hill East','Rothwell','Kippa-Ring']},
  {id:'SHO',col:C.SHO,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Wooloowin','Albion','Bindha','Banyo','Nudgee','Boondall','North Boondall','Deagon','Sandgate','Shorncliffe']},
  {id:'AIR',col:C.AIR,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Wooloowin','Albion','Domestic Airport','International Airport']},
  {id:'DOO',col:C.DOO,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Eagle Junction','Clayfield','Hendra','Ascot','Doomben']},
  {id:'FER',col:C.FER,stops:['Roma Street','Central','Fortitude Valley','Bowen Hills','Windsor','Wilston','Newmarket','Alderley','Enoggera','Gaythorne','Mitchelton','Oxford Park','Grovely','Keperra','Ferny Grove']},
  {id:'BEL',col:C.BEL,stops:['Roma Street','South Brisbane','South Bank','Boggo Road','Dutton Park','Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury','Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove','Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania','Edens Landing','Holmview','Beenleigh']},
  {id:'GOL',col:C.GOL,stops:['Roma Street','South Brisbane','South Bank','Boggo Road','Dutton Park','Fairfield','Yeronga','Yeerongpilly','Moorooka','Rocklea','Salisbury','Coopers Plains','Banoon','Sunnybank','Altandi','Runcorn','Fruitgrove','Kuraby','Trinder Park','Woodridge','Kingston','Loganlea','Bethania','Edens Landing','Holmview','Beenleigh','Ormeau','Pimpama','Coomera','Helensvale','Nerang','Robina','Varsity Lakes']},
  {id:'CLV',col:C.CLV,stops:['Roma Street','South Brisbane','South Bank','Boggo Road','Buranda','Coorparoo','Norman Park','Morningside','Cannon Hill','Murarrie','Hemmant','Lindum','Wynnum North','Wynnum','Wynnum Central','Manly','Lota','Thorneside','Birkdale','Wellington Point','Ormiston','Cleveland']},
  {id:'IPL',col:C.IPL,stops:['Roma Street','Milton','Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra','Wacol','Gailes','Goodna','Redbank','Riverview','Dinmore','Bundamba','Booval','Ipswich','Walloon','Rosewood']},
  {id:'SPR',col:C.SPR,stops:['Roma Street','Milton','Auchenflower','Toowong','Taringa','Indooroopilly','Chelmer','Graceville','Sherwood','Corinda','Oxley','Darra','Richlands','Springfield','Springfield Central']},
];

// ─────────────────────────────────────────────────────────────────────────────
// LAYOUT ENGINE
// Each segment travels in (dx,dy) direction, U pixels per step.
// Branches: one step (dx:±1,dy:±1) for the 45° kink, then horizontal (dy:0).
// ─────────────────────────────────────────────────────────────────────────────
let canW=0,canH=0,vp={x:0,y:0,scale:1};
let nodeXY={},drawSegs=[],linePts={};

function buildLayout(W,H){
  nodeXY={};drawSegs=[];
  for(const ln of LINES) linePts[ln.id]=[];
  // U: station spacing in pixels. Fit ~55 stops east, ~6 y-slots vertically.
  const U=Math.min(W*0.85/56, H*0.85/20);
  nodeXY['Roma Street']={x:0,y:0};
  walkTree(TREE,0,0,U);
  for(const ln of LINES)
    linePts[ln.id]=ln.stops.filter(s=>nodeXY[s]).map(s=>({name:s,...nodeXY[s]}));
}

function walkTree(node,px,py,U){
  const{stops,cols,dx=0,dy=0,children=[]}=node;
  for(let i=0;i<stops.length;i++)
    if(!nodeXY[stops[i]]) nodeXY[stops[i]]={x:px+dx*i*U,y:py+dy*i*U};
  for(let i=0;i<stops.length-1;i++){
    const a=nodeXY[stops[i]],b=nodeXY[stops[i+1]];
    if(a&&b) drawSegs.push({x1:a.x,y1:a.y,x2:b.x,y2:b.y,cols});
  }
  const lp=nodeXY[stops[stops.length-1]];
  if(!lp)return;
  for(const child of children){
    const cf=child.stops[0];
    if(!nodeXY[cf]) nodeXY[cf]={x:lp.x+(child.dx??0)*U,y:lp.y+(child.dy??0)*U};
    drawSegs.push({x1:lp.x,y1:lp.y,x2:nodeXY[cf].x,y2:nodeXY[cf].y,cols:child.cols});
    walkTree(child,nodeXY[cf].x,nodeXY[cf].y,U);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEWPORT
// ─────────────────────────────────────────────────────────────────────────────
function toCanvas(cx,cy){return[cx*vp.scale+vp.x, cy*vp.scale+vp.y];}
function toContent(px,py){return[(px-vp.x)/vp.scale, (py-vp.y)/vp.scale];}
function centreRoma(){vp.x=canW/2; vp.y=canH/2;}
function resetView(){vp={x:0,y:0,scale:1};centreRoma();draw();}
function zoom(f,px,py){
  const cv=document.getElementById('sch');
  px=px??cv.width/2; py=py??cv.height/2;
  const[wx,wy]=toContent(px,py);
  vp.scale=Math.max(.08,Math.min(12,vp.scale*f));
  vp.x=px-wx*vp.scale; vp.y=py-wy*vp.scale;
  draw();
}

// ─────────────────────────────────────────────────────────────────────────────
// TRAIN POSITIONING
// ─────────────────────────────────────────────────────────────────────────────
// Maps 2-letter station code to line ID. City-hub codes (BR,BN,BD) aren't unique.
// Terminus codes uniquely identify a line.
const CODE_TO_LINE = {
  FG:'FER',FN:'FER',                  // Ferny Grove
  GY:'CAB',CA:'CAB',NA:'CAB',         // Caboolture / Nambour / Gympie
  KP:'KCL',KL:'KCL',                  // Kippa-Ring / Redcliffe
  SH:'SHO',                            // Shorncliffe
  AP:'AIR',BD:'AIR',                   // Airport (BD=Bowen Hills terminus for airport trips)
  DB:'DOO',                            // Doomben
  BL:'BEL',BH:'BEL',                  // Beenleigh
  VL:'GOL',                            // Gold Coast / Varsity Lakes
  CL:'CLV',                            // Cleveland
  RW:'IPL',IP:'IPL',                   // Ipswich / Rosewood
  SP:'SPR',SC:'SPR',                   // Springfield
};
// City hub codes — not unique, use BEL as default inner-city line
const CITY_CODES = new Set(['BR','BN','RO']);
function trainPos(v){
  let pts=null;
  const code=(v.route_id||'').toUpperCase().split('-')[0];
  // Try exact line id match first (e.g. route starts with 'CAB', 'KCL')
  for(const ln of LINES){
    if(code.startsWith(ln.id)){pts=linePts[ln.id];break;}
  }
  // Check dest code (where train is going) first — it identifies the terminus line
  if(!pts && code.length>=4){
    const orig=code.slice(0,2), dest=code.slice(2,4);
    const lineId = (!CITY_CODES.has(dest) ? CODE_TO_LINE[dest] : null)
                || (!CITY_CODES.has(orig) ? CODE_TO_LINE[orig] : null)
                || CODE_TO_LINE[dest] || CODE_TO_LINE[orig];
    if(lineId) pts=linePts[lineId];
  }
  // City-only codes (BRBR, BNBN, BRBD etc) → inner Beenleigh corridor
  if(!pts && code.length>=4){
    const orig=code.slice(0,2), dest=code.slice(2,4);
    if(CITY_CODES.has(orig)&&CITY_CODES.has(dest)) pts=linePts['BEL'];
  }
  if(!pts||!pts.length) pts=linePts['CAB']||[];
  const nn=s=>s.toLowerCase().replace(/,?\s*platform\s*\d+\s*$/i,'').replace(/\s+station$/i,'').trim();
  const nxt=nn(v.next_stops?.[0]?.stop_name||'');
  const cur=nn(v.current_stop_name||'');
  const fw=w=>w.split(' ')[0];
  let ni=-1,ci=-1;
  for(let i=0;i<pts.length;i++){
    const sn=nn(pts[i].name);
    if(ni<0&&nxt&&(sn===nxt||sn.startsWith(fw(nxt))||nxt.startsWith(fw(sn))))ni=i;
    if(ci<0&&cur&&(sn===cur||sn.startsWith(fw(cur))||cur.startsWith(fw(sn))))ci=i;
  }
  if(ni<0&&ci<0)return pts[Math.floor(pts.length/2)]||{x:0,y:0};
  if(v.current_status==='STOPPED_AT'||ni<0)return pts[ci>=0?ci:0]||pts[0];
  const fi=ci>=0?ci:Math.max(0,ni-1);
  if(fi===ni)return pts[ni];
  const a=pts[Math.min(fi,pts.length-1)],b=pts[Math.min(ni,pts.length-1)];
  return{x:(a.x+b.x)/2,y:(a.y+b.y)/2};
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────────────────────────────
const LW=4.5, SR=4.5;

function draw(){
  const cv=document.getElementById('sch'), ctx=cv.getContext('2d');
  ctx.clearRect(0,0,canW,canH);
  ctx.fillStyle='#0b0d10'; ctx.fillRect(0,0,canW,canH);

  // Dot grid
  ctx.fillStyle='rgba(255,255,255,0.02)';
  for(let x=24;x<canW;x+=24)for(let y=24;y<canH;y+=24){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}

  ctx.save(); ctx.translate(vp.x,vp.y); ctx.scale(vp.scale,vp.scale);
  ctx.lineCap='round'; ctx.lineJoin='round';

  // ── Draw segments ───────────────────────────────────────────────────────
  for(const seg of drawSegs){
    const n=seg.cols.length;
    for(let i=0;i<n;i++){
      const gap=4/vp.scale;
      const off=(i-(n-1)/2)*gap;
      const dx=seg.x2-seg.x1, dy=seg.y2-seg.y1;
      const len=Math.hypot(dx,dy)||1;
      const ox=-dy/len*off, oy=dx/len*off;
      ctx.strokeStyle=seg.cols[i];
      ctx.lineWidth=LW/vp.scale;
      ctx.globalAlpha=0.9;
      ctx.beginPath();
      ctx.moveTo(seg.x1+ox,seg.y1+oy);
      ctx.lineTo(seg.x2+ox,seg.y2+oy);
      ctx.stroke();
    }
  }
  ctx.globalAlpha=1;

  // ── Station nodes + labels ──────────────────────────────────────────────
  // Count how many lines use each station
  const stUsage={};
  for(const ln of LINES)for(const s of ln.stops)stUsage[s]=(stUsage[s]||0)+1;
  const termini=new Set();
  for(const ln of LINES){
    const vd=ln.stops.filter(s=>nodeXY[s]);
    if(vd.length){termini.add(vd[0]);termini.add(vd[vd.length-1]);}
  }

  // Sort by x for left-to-right label dedup
  const stList=Object.entries(nodeXY)
    .filter(([nm])=>nm!=='Roma Street')
    .map(([nm,pos])=>({nm,pos}))
    .sort((a,b)=>a.pos.x-b.pos.x);

  // Track last label screen-x per y-bucket and side
  const lblX={};

  for(const{nm,pos}of stList){
    const isJ=(stUsage[nm]||0)>1, isT=termini.has(nm);
    const r=(isJ?SR+2:isT?SR+1:SR*0.65)/vp.scale;
    const lw=1.5/vp.scale;
    const col=LINES.find(l=>l.stops.includes(nm))?.col||'#888';

    // Draw node symbol
    if(isJ){
      ctx.save();ctx.translate(pos.x,pos.y);
      ctx.beginPath();ctx.moveTo(0,-r*1.1);ctx.lineTo(r*1.1,0);ctx.lineTo(0,r*1.1);ctx.lineTo(-r*1.1,0);ctx.closePath();
      ctx.fillStyle='#1a2535';ctx.fill();ctx.strokeStyle='#c0d4ee';ctx.lineWidth=lw;ctx.stroke();
      ctx.restore();
    } else if(isT){
      ctx.beginPath();ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=lw;ctx.stroke();
    } else {
      ctx.beginPath();ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
      ctx.fillStyle='#111928';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();
    }

    // Labels
    const sx=pos.x*vp.scale+vp.x, sy=pos.y*vp.scale+vp.y;
    if(sx<-50||sx>canW+50||sy<-30||sy>canH+30)continue;
    if(!isJ&&!isT&&vp.scale<0.5)continue;
    if(isJ&&vp.scale<0.15)continue;

    // Decide label side based on y position relative to Roma St (y=0)
    // Segments above Roma (negative y in content) → label above
    // Segments below (positive y) → label below
    // Main corridor (y≈0) → alternate based on x bucket
    const contentY=pos.y;
    // Labels above the line for negative-y rows, below for positive-y, alternating for y≈0
    let above;
    if(contentY < -0.1)     above=true;
    else if(contentY > 0.1) above=false;
    else                     above=(Math.round(pos.x/2)%2===0);

    // Slot key based on rounded y-row — nodes 2U apart get different keys
    const slotKey=`${Math.round(contentY)}_${above?'a':'b'}`;
    const lastX=lblX[slotKey]??-99999;
    // Minimum screen-px gap between labels on the same row
    const minGap=isJ?30:isT?30:55;
    if(!isJ&&!isT&&(sx-lastX)<minGap)continue;
    lblX[slotKey]=sx;

    const fs=Math.max(7,(isJ?10:isT?9.5:8)/vp.scale);
    ctx.fillStyle=isJ?'#c0d4ee':isT?col:'#4a6888';
    ctx.font=`${isJ||isT?'600 ':''}${fs}px -apple-system,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline=above?'bottom':'top';
    const label=nm.replace(/,?\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,'');
    ctx.fillText(label,pos.x,pos.y+(above?-1:1)*(r+2.5/vp.scale));
  }

  // ── Roma Street hub ─────────────────────────────────────────────────────
  {
    const r=10/vp.scale,lw=2/vp.scale;
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle='#1a2535';ctx.fill();ctx.strokeStyle='#ffffff';ctx.lineWidth=lw;ctx.stroke();
    if(vp.scale>0.2){
      ctx.fillStyle='#fff';
      ctx.font=`bold ${Math.max(7,8/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('Roma St',0,0);
    }
  }

  // ── Trains ────────────────────────────────────────────────────────────────
  for(const v of vehicles){
    const pos=trainPos(v),col=trainColour(v);
    const sel=selType==='train'&&selId===v.id;
    const delay=v.delay_seconds||0;
    const TW=(sel?38:30)/vp.scale, TH=(sel?16:12)/vp.scale, rx=3/vp.scale;
    const{x,y}=pos;

    // Outer glow — stronger than before for visibility
    const gr=ctx.createRadialGradient(x,y,0,x,y,TH*4);
    gr.addColorStop(0,col+'66');gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(x,y,TH*4,0,Math.PI*2);ctx.fill();

    if(sel){
      const p=.4+.3*Math.abs(Math.sin(Date.now()/350));
      ctx.beginPath();ctx.arc(x,y,TH*2.5,0,Math.PI*2);
      ctx.strokeStyle=col;ctx.lineWidth=2.5/vp.scale;ctx.globalAlpha=p;ctx.stroke();ctx.globalAlpha=1;
    }

    // Drop shadow
    ctx.save();ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=8/vp.scale;
    // Body
    ctx.beginPath();
    ctx.moveTo(x-TW/2+rx,y-TH/2);ctx.lineTo(x+TW/2-rx,y-TH/2);
    ctx.arcTo(x+TW/2,y-TH/2,x+TW/2,y-TH/2+rx,rx);ctx.lineTo(x+TW/2,y+TH/2-rx);
    ctx.arcTo(x+TW/2,y+TH/2,x+TW/2-rx,y+TH/2,rx);ctx.lineTo(x-TW/2+rx,y+TH/2);
    ctx.arcTo(x-TW/2,y+TH/2,x-TW/2,y+TH/2-rx,rx);ctx.lineTo(x-TW/2,y-TH/2+rx);
    ctx.arcTo(x-TW/2,y-TH/2,x-TW/2+rx,y-TH/2,rx);ctx.closePath();
    ctx.fillStyle=col;ctx.fill();
    ctx.restore();
    // Border
    ctx.beginPath();
    ctx.moveTo(x-TW/2+rx,y-TH/2);ctx.lineTo(x+TW/2-rx,y-TH/2);
    ctx.arcTo(x+TW/2,y-TH/2,x+TW/2,y-TH/2+rx,rx);ctx.lineTo(x+TW/2,y+TH/2-rx);
    ctx.arcTo(x+TW/2,y+TH/2,x+TW/2-rx,y+TH/2,rx);ctx.lineTo(x-TW/2+rx,y+TH/2);
    ctx.arcTo(x-TW/2,y+TH/2,x-TW/2,y+TH/2-rx,rx);ctx.lineTo(x-TW/2,y-TH/2+rx);
    ctx.arcTo(x-TW/2,y-TH/2,x-TW/2+rx,y-TH/2,rx);ctx.closePath();
    ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.5)';ctx.lineWidth=(sel?2.5:1.5)/vp.scale;ctx.stroke();

    // Highlight stripe
    ctx.fillStyle='rgba(255,255,255,.2)';
    ctx.beginPath();ctx.rect(x-TW/2+rx,y-TH/2,TW-rx*2,TH*0.35);ctx.fill();

    // Late stripe
    if(delay>60){ctx.fillStyle='#cc1111';ctx.fillRect(x-TW/2,y-TH/2,5/vp.scale,TH);}

    // Label
    if(vp.scale>0.25){
      const fs=Math.max(7,(sel?10:8)/vp.scale);
      ctx.fillStyle='#fff';
      ctx.font=`bold ${fs}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText((v.route_id||'').slice(0,3),x,y+.5/vp.scale);
    }
    if(delay>60&&vp.scale>0.35){
      ctx.fillStyle='#ff8888';ctx.font=`bold ${Math.max(6,6/vp.scale)}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(`+${Math.round(delay/60)}m`,x,y-TH/2-2/vp.scale);
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────────────────────────────────────
let dragging=false,dragS={},vpS={},selId=null,selType=null,vehicles=[];

function hitTest(cx,cy){
  const tr=14/vp.scale;
  for(const v of vehicles){const p=trainPos(v);if(Math.hypot(cx-p.x,cy-p.y)<tr)return{t:'train',v};}
  const sr=10/vp.scale;
  for(const[nm,pos]of Object.entries(nodeXY))if(Math.hypot(cx-pos.x,cy-pos.y)<sr)return{t:'station',n:nm};
  return null;
}
function handleHit(h){
  if(h.t==='train'){
    if(selId===h.v.id&&selType==='train'){clearD();return;}
    selId=h.v.id;selType='train';renderList();showTrain(h.v);
  } else {
    selId=h.n;selType='station';renderList();showStation(h.n);
  }
}

const sch=document.getElementById('sch');
sch.addEventListener('mousedown',e=>{
  const[cx,cy]=toContent(e.offsetX,e.offsetY);
  const h=hitTest(cx,cy);if(h){handleHit(h);return;}
  dragging=true;dragS={x:e.clientX,y:e.clientY};vpS={x:vp.x,y:vp.y};
});
sch.addEventListener('mousemove',e=>{if(!dragging)return;vp.x=vpS.x+(e.clientX-dragS.x);vp.y=vpS.y+(e.clientY-dragS.y);draw();});
sch.addEventListener('mouseup',()=>{dragging=false;});
sch.addEventListener('mouseleave',()=>{dragging=false;});
sch.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1.12:.89,e.offsetX,e.offsetY);},{passive:false});

// ─────────────────────────────────────────────────────────────────────────────
// PANELS
// ─────────────────────────────────────────────────────────────────────────────
function clearD(){selId=null;selType=null;document.getElementById('nosel').style.display='flex';document.getElementById('selc').style.display='none';}
function openD(){document.getElementById('nosel').style.display='none';document.getElementById('selc').style.display='flex';}
function mkrows(a){return a.map(([l,v,c])=>`<div class="ir"><span class="lb">${l}</span><span class="vl ${c||''}">${v}</span></div>`).join('');}

function showTrain(v){
  openD();
  const d=v.delay_seconds||0,ds=d===0?'On Time':d>0?`+${Math.round(d/60)}m late`:`${Math.round(d/60)}m early`,dc=d>60?'warn':d<-30?'info':'ok';
  const dirs=['N','NE','E','SE','S','SW','W','NW'],hd=v.bearing?dirs[Math.round(v.bearing/45)%8]+` ${v.bearing}°`:'—';
  const st=v.current_stop_name?(v.current_status==='STOPPED_AT'?'At ':'To ')+v.current_stop_name.replace(/,?\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,''):v.current_status?.replace(/_/g,' ')||'—';
  document.getElementById('sel-hdr').innerHTML=`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <div style="width:10px;height:10px;border-radius:2px;background:${trainColour(v)}"></div>
      <div style="font-weight:700;font-size:11px;color:#e8f0fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.route_id||'—'} → ${v.headsign||'—'}</div>
    </div>
    ${mkrows([['Train',v.label||v.id,''],['Status',st,''],['Delay',ds,dc],['Speed',v.speed?v.speed+' km/h':'—',''],['Heading',hd,'']])}`;
  const td=d,stops=v.next_stops||[];
  document.getElementById('sel-body').innerHTML=`<div class="itl">Next Stops</div>${stops.length?stops.map((s,i)=>{
    const nm=(s.stop_name||s.stop_id).replace(/,\s*[Pp]latform\s*\d+\s*$/,'').replace(/\s+[Ss]tation$/i,'');
    const d2=s.arrival_delay;let ds2='';
    if(d2!=null){if(Math.abs(d2)<60)ds2='';else if(Math.abs(d2-td)>=60)ds2=d2>0?`+${Math.round(d2/60)}m`:`${Math.round(d2/60)}m`;}
    return`<div class="sr"><div class="sn">${i+1}</div><div class="sm">${nm}</div><div class="sd ${d2>60?'late':'ok'}">${ds2}</div></div>`;
  }).join(''):'<div style="color:#3a4a5e;font-size:10px">No data</div>'}`;
}

function minsUntil(t){if(!t)return'';const m=Math.round((t-Date.now()/1000)/60);return m<=0?'Now':`${m}m`;}

function showStation(name){
  openD();
  document.getElementById('sel-hdr').innerHTML=`<div class="itl">Station</div><div style="font-weight:700;font-size:11px;color:#e8f0fa">${name}</div>`;
  const nn=s=>s.toLowerCase().replace(/,?\s*platform\s*\d+\s*$/i,'').replace(/\s+station$/i,'').trim(),ns=nn(name),arr=[];
  for(const v of vehicles)for(const s of v.next_stops||[]){
    const sn=nn(s.stop_name||'');
    if(sn===ns||sn.startsWith(ns.split(' ')[0])||ns.startsWith(sn.split(' ')[0])){
      const delay=s.arrival_delay||0;
      arr.push({vid:v.id,route_id:v.route_id,headsign:v.headsign||v.label,delay,arr_time:(s.arrival_time||0)+delay,col:trainColour(v)});
    }
  }
  arr.sort((a,b)=>(a.arr_time||0)-(b.arr_time||0));
  const ft=t=>t?new Date(t*1000).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
  document.getElementById('sel-body').innerHTML=`<div class="itl">Next Arrivals</div>${arr.length?arr.slice(0,8).map(a=>{
    const mins=minsUntil(a.arr_time),ds=a.delay===0?'':a.delay>0?`+${Math.round(a.delay/60)}m`:`${Math.round(a.delay/60)}m`;
    return`<div class="ar" onclick="selectTrain('${a.vid}')">
      <div class="ab" style="background:${a.col}">${(a.route_id||'').slice(0,3)}</div>
      <div class="ad">${a.headsign||'—'}</div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-weight:700;font-size:11px;color:${mins==='Now'?'#ff8844':'#e8f0fa'}">${mins}</div>
        ${ds?`<div style="font-size:8px;color:${a.delay>60?'#ff4444':'#3ddc84'}">${ds}</div>`:''}
      </div>
    </div>`;
  }).join(''):'<div style="color:#3a4a5e;font-size:10px">No arrivals</div>'}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────────────────────
function renderList(){
  const q=document.getElementById('sbq').value.toLowerCase();
  const s=[...vehicles].filter(v=>!q||(v.route_id||'').toLowerCase().includes(q)||(v.headsign||'').toLowerCase().includes(q)||(v.line_name||'').toLowerCase().includes(q)).sort((a,b)=>(b.delay_seconds||0)-(a.delay_seconds||0));
  const dc=d=>d>60?'late':d<-30?'early':'ok',dl=d=>d>60?`+${Math.round(d/60)}m`:d<-30?`${Math.round(d/60)}m`:'On time';
  document.getElementById('tlist').innerHTML=s.length?s.map(v=>{
    const d=v.delay_seconds||0,sel=selType==='train'&&selId===v.id,bc=trainColour(v);
    return`<div class="en ${sel?'sel':''}" onclick="selectTrain('${v.id}')">
      <div class="et">
        <span class="rb" style="background:${bc}">${(v.headsign||v.route_id||'—').replace(/\s+[Ss]tation$/i,'').slice(0,18)}</span>
        <span class="dtg ${dc(d)}">${dl(d)}</span>
      </div>
      <div class="em">${v.current_stop_name?('→ '+v.current_stop_name.replace(/\s+[Ss]tation$/i,'').slice(0,20)):''}</div>
    </div>`;
  }).join(''):`<div style="color:#3a4a5e;padding:12px;text-align:center;font-size:10px">No trains</div>`;
}
function selectTrain(id){const v=vehicles.find(x=>x.id===id);if(!v)return;if(selId===id&&selType==='train'){clearD();return;}selId=id;selType='train';renderList();showTrain(v);}

// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
async function refresh(){
  try{
    const r=await fetch(API_BASE+'/vehicles'),d=await r.json();
    vehicles=d.vehicles||[];
    const late=vehicles.filter(v=>(v.delay_seconds||0)>60).length;
    document.getElementById('hcount').textContent=d.count||0;
    document.getElementById('hlate').textContent=late;
    document.getElementById('sbcount').textContent=d.count||0;
    const age=d.last_updated?Math.round(Date.now()/1000-d.last_updated):null;
    document.getElementById('hupdated').textContent=age!=null?`${age}s ago`:'—';
    renderList();
    if(selType==='train'&&selId){const v=vehicles.find(x=>x.id===selId);if(v)showTrain(v);else clearD();}
  }catch{document.getElementById('sled').classList.add('red');}
}

setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});},1000);
function animLoop(){draw();requestAnimationFrame(animLoop);}
function resize(){
  const c=document.getElementById('sch'),w=document.getElementById('cwrap');
  c.width=w.clientWidth;c.height=w.clientHeight;canW=c.width;canH=c.height;
  buildLayout(canW,canH);centreRoma();draw();
}
window.addEventListener('resize',resize);
resize();refresh().then(()=>animLoop());setInterval(refresh,15000);

// ── Sidebar toggle ─────────────────────────────────────────────────────────
function toggleSidebar(){
  const sb=document.querySelector('.sb');
  const btn=document.getElementById('sidebar-toggle');
  const collapsed=sb.classList.toggle('collapsed');
  btn.textContent=collapsed?'▶':'☰';
  btn.title=collapsed?'Open sidebar':'Close sidebar';
}
if(window.innerWidth<768){
  document.querySelector('.sb').classList.add('collapsed');
  const btn=document.getElementById('sidebar-toggle');
  if(btn){btn.textContent='▶';btn.title='Open sidebar';}
}

</script>
