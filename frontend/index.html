<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queensland Live Train Tracker</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e0e6f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0d1b2a 0%, #1a2e45 100%);
      border-bottom: 1px solid #1e3a5a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #e63946, #c1121f);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    h1 span { color: #e63946; }

    .subtitle { font-size: 0.72rem; color: #7a9ab8; }

    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .stat-pill {
      background: #0d1b2a;
      border: 1px solid #1e3a5a;
      border-radius: 20px;
      padding: 5px 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
    }

    .stat-pill .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .stat-pill.error .dot { background: #e63946; animation: none; }
    .stat-pill.stale .dot { background: #f59e0b; }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    .btn {
      background: #1e3a5a;
      border: 1px solid #2d5a8a;
      border-radius: 6px;
      color: #e0e6f0;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #2d5a8a; }
    .btn.active { background: #e63946; border-color: #e63946; }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      background: #0d1b2a;
      border-right: 1px solid #1e3a5a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.25s ease, opacity 0.25s ease;
    }
    .sidebar.collapsed {
      width: 0;
      opacity: 0;
      pointer-events: none;
      border-right: none;
    }
    /* Toggle button — always visible in header */
    #sidebar-toggle {
      background: none;
      border: 1px solid #1e3a5a;
      border-radius: 5px;
      color: #7a9ab8;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 9px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    #sidebar-toggle:hover { background: #1e3a5a; color: #e0e6f0; }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #1e3a5a;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 0.68rem;
      cursor: pointer;
      color: #7a9ab8;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #e63946; border-bottom-color: #e63946; }

    .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    .train-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .train-card {
      background: #111e30;
      border: 1px solid #1e3a5a;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .train-card:hover { border-color: #3d7ab8; background: #162436; }
    .train-card.selected { border-color: #e63946; background: #1a1015; }



    .delay-badge {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .delay-on-time  { background: #14532d; color: #4ade80; }
    .delay-late     { background: #7f1d1d; color: #fca5a5; }
    .delay-early    { background: #1e3a8a; color: #93c5fd; }



    /* Alerts tab */
    .alerts-list { overflow-y: auto; flex: 1; padding: 8px; }

    .alert-card {
      background: #1a1010;
      border: 1px solid #5c2020;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }

    .alert-header {
      font-size: 0.78rem;
      font-weight: 600;
      color: #fca5a5;
      margin-bottom: 4px;
    }

    .alert-desc { font-size: 0.7rem; color: #c08080; line-height: 1.4; }

    .alert-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }

    .alert-tag {
      background: #3d1010;
      border: 1px solid #5c2020;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 0.65rem;
      color: #f08080;
    }

    .no-data {
      text-align: center;
      color: #4a6a8a;
      padding: 30px 20px;
      font-size: 0.8rem;
    }

    /* Search */
    .search-box {
      padding: 8px;
      border-bottom: 1px solid #1e3a5a;
    }

    .search-box input {
      width: 100%;
      background: #111e30;
      border: 1px solid #1e3a5a;
      border-radius: 6px;
      color: #e0e6f0;
      padding: 7px 12px;
      font-size: 0.72rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #3d7ab8; }
    .search-box input::placeholder { color: #4a6a8a; }

    /* ── Map ── */
    #map {
      flex: 1;
      background: #0a0e1a;
    }

    /* ── Info panel ── */
    #info-panel {
      position: absolute;
      bottom: 30px;
      right: 20px;
      width: 280px;
      background: rgba(13,27,42,0.95);
      border: 1px solid #1e3a5a;
      border-radius: 12px;
      padding: 14px;
      z-index: 999;
      display: none;
      backdrop-filter: blur(10px);
    }

    #info-panel.visible { display: block; }

    #info-panel h3 { font-size: 0.9rem; color: #fff; margin-bottom: 10px; }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      padding: 4px 0;
      border-bottom: 1px solid #1e3a5a;
    }
    .info-row:last-child { border: none; }
    .info-row .label { color: #7a9ab8; }
    .info-row .value { color: #e0e6f0; font-weight: 500; }

    #info-panel .close-btn {
      position: absolute;
      top: 8px; right: 10px;
      background: none; border: none;
      color: #7a9ab8; cursor: pointer;
      font-size: 1.1rem;
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 70px; right: 20px;
      background: #1e3a5a;
      border: 1px solid #2d5a8a;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.78rem;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Leaflet dark overrides */
    .leaflet-container { background: #0e1826 !important; }
    .station-popup .leaflet-popup-content-wrapper { background: #161a20; border: 1px solid #252d3a; border-radius: 8px; padding: 0; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
    .station-popup .leaflet-popup-content { margin: 0; }
    .station-popup .leaflet-popup-tip { background: #161a20; }
    .station-popup .leaflet-popup-close-button { color: #4a5568 !important; top: 6px !important; right: 8px !important; }
    .leaflet-tile { filter: brightness(0.35) saturate(0.3) hue-rotate(195deg); }

    /* Custom train marker */
    /* SVG-based marker — no CSS transform conflicts */
    .train-marker-svg { cursor: pointer; overflow: visible; display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1e3a5a; border-radius: 3px; }

    /* Loading overlay */
    #loading {
      position: fixed; inset: 0;
      background: #0a0e1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s;
    }
    #loading.fade { opacity: 0; pointer-events: none; }

    .loader-train {
      font-size: 3rem;
      animation: chug 1s steps(2) infinite;
    }
    @keyframes chug {
      0%  { transform: translateX(-5px); }
      50% { transform: translateX( 5px); }
      100%{ transform: translateX(-5px); }
    }

    .loader-text {
      margin-top: 16px;
      color: #7a9ab8;
      font-size: 0.9rem;
    }

    .loader-bar {
      width: 200px; height: 3px;
      background: #1e3a5a;
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%;
      background: #e63946;
      border-radius: 2px;
      animation: load 2s ease-in-out infinite;
    }
    @keyframes load {
      0%  { width: 0%; }
      100%{ width: 100%; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div class="loader-train">🚆</div>
  <div class="loader-text">Connecting to Queensland Translink feeds…</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🚆</div>
    <div>
      <h1>Queensland <span>Live Train Tracker</span></h1>
      <div class="subtitle">Translink SEQ Rail · GTFS-RT · Open Data</div>
    </div>
  </div>
  <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
  <div class="header-stats">
    <div class="stat-pill" id="status-pill">
      <div class="dot"></div>
      <span id="vehicle-count">—</span> trains
    </div>
    <div class="stat-pill" id="update-pill">
      <span id="last-updated">Connecting…</span>
    </div>
    <button class="btn" id="toggle-labels-btn" onclick="toggleLabels()">Labels</button>
    <button class="btn active" id="auto-refresh-btn" onclick="toggleAutoRefresh()">Live ●</button>
    <div style="width:1px;height:20px;background:#1e3a5a;margin:0 4px"></div>
    <button class="btn active" onclick="">🗺 Map</button>
    <button class="btn" onclick="window.location.href=API_BASE.replace('/api','') + '/control.html'">🖥 Control</button>
  </div>
</header>

<!-- Main -->
<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" onclick="switchTab('trains')">🚆 Trains</div>
      <div class="tab" onclick="switchTab('alerts')">⚠️ Alerts</div>
    </div>

    <!-- Trains tab -->
    <div class="tab-content active" id="tab-trains">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search line, destination…" oninput="renderTrainList()" />
      </div>
      <div class="train-list" id="train-list">
        <div class="no-data">Loading train data…</div>
      </div>
    </div>

    <!-- Alerts tab -->
    <div class="tab-content" id="tab-alerts">
      <div class="alerts-list" id="alerts-list">
        <div class="no-data">Loading alerts…</div>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<!-- Info Panel (floating, bottom-right) -->
<div id="info-panel">
  <button class="close-btn" onclick="closeInfoPanel()">✕</button>
  <h3 id="info-title">Train Detail</h3>
  <div id="info-content"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
// All API calls go through the nginx proxy on the same origin.
// The backend is only reachable on the internal Docker network (never exposed to the host).
// API_BASE: works at root, subfolders, with or without trailing slash
// Treats the current page URL as a folder (even if no trailing slash)
// so fetch(API_BASE+'/vehicles') always resolves correctly.
const API_BASE = (()=>{
  let path = location.pathname;
  // If path has no trailing slash and no file extension, treat it as a directory
  if (!path.endsWith('/') && !path.split('/').pop().includes('.')) path += '/';
  // Get directory portion
  const dir = path.substring(0, path.lastIndexOf('/') + 1);
  return location.origin + dir + 'api';
})();

const REFRESH_MS   = 15000;  // match backend poll interval
const SEQ_CENTRE   = [-27.47, 153.02]; // Brisbane

// ── State ────────────────────────────────────────────────────────────────────
let map, markersLayer, shapesLayer, stationsLayer;
let vehicles        = [];
let selectedId      = null;
let showLabels      = false;
let autoRefresh     = true;
let refreshTimer    = null;
let markerObjects   = {};

// ── Animation state per train ────────────────────────────────────────────────
const animState = {};
const STALE_THRESHOLD = 120; // seconds stopped before red ring
let animFrame = null;
let lastTick  = null;

function startAnimLoop() {
  if (animFrame) return;
  function tick(ts) {
    const dt = lastTick ? Math.min((ts - lastTick) / 1000, 0.5) : 0.016;
    lastTick = ts;

    const now = Date.now() / 1000;

    for (const v of vehicles) {
      let s = animState[v.id];

      // ── Initialise on first sight ─────────────────────────────
      if (!s) {
        s = animState[v.id] = {
          lat: v.lat, lon: v.lon,
          fromLat: v.lat, fromLon: v.lon,
          toLat: v.lat, toLon: v.lon,
          progress: 1, speed: 0,
          stoppedAt: null,
          staleRing: false,
          stationaryPolls: 0,
          lastGPS: {lat: v.lat, lon: v.lon},
          lastPollTime: 0,
        };
      }

      // Detect if GPS position changed (new data arrived from server poll)
      const isNewPoll = (v._pollTime || 0) > (s.lastPollTime || 0);
      if (isNewPoll) {
        s.lastPollTime = v._pollTime || now;
        const gpsMoved = Math.hypot(v.lat - s.lastGPS.lat, v.lon - s.lastGPS.lon) > 0.0002;
        if (gpsMoved) {
          // GPS moved — train is running normally
          s.fromLat = s.lastGPS.lat; s.fromLon = s.lastGPS.lon;
          s.toLat   = v.lat;         s.toLon   = v.lon;
          s.progress = 0;
          s.stoppedAt = null;
          s.staleRing = false;
          s.stationaryPolls = 0;
          s.lastGPS = {lat: v.lat, lon: v.lon};
        } else {
          // GPS unchanged this poll
          s.stationaryPolls = (s.stationaryPolls || 0) + 1;
          // Only flag stale if:
          // 1. Train is NOT officially at a station
          // 2. GPS hasn't moved for at least 3 consecutive polls (~45s)
          // 3. Total stopped time exceeds threshold
          const atStation = v.current_status === 'STOPPED_AT';
          if (atStation) {
            // Normal station dwell — reset everything
            s.stoppedAt = null;
            s.staleRing = false;
            s.stationaryPolls = 0;
          } else if (s.stationaryPolls >= 3) {
            if (!s.stoppedAt) s.stoppedAt = now;
            s.staleRing = (now - s.stoppedAt) > STALE_THRESHOLD;
          }
        }
      }

      // ── Animate position ──────────────────────────────────────
      const dist = Math.hypot(s.toLat - s.fromLat, s.toLon - s.fromLon);

      if (v.current_status === 'STOPPED_AT') {
        // Snap to GPS when officially stopped at a station
        s.lat = v.lat; s.lon = v.lon;
        s.progress = 1;
      } else if (dist > 0.00002 && s.progress < 1) {
        // Move at constant speed — arrive just before next poll so there's no pause
        // Target: cover the distance in 13s (poll is 15s, leave 2s buffer)
        const step = dt / 13;
        s.progress = Math.min(1, s.progress + step);
        s.lat = s.fromLat + (s.toLat - s.fromLat) * s.progress;
        s.lon = s.fromLon + (s.toLon - s.fromLon) * s.progress;
      } else {
        s.lat = s.toLat; s.lon = s.toLon;
      }

      // ── Stale ring is evaluated inside the isNewPoll block above ──────────

      if (markerObjects[v.id]) {
        markerObjects[v.id].setLatLng([s.lat, s.lon]);
        // Update icon if stale state changed (to show/hide red ring)
        const marker = markerObjects[v.id];
        if (marker._staleRing !== s.staleRing) {
          marker._staleRing = s.staleRing;
          marker.setIcon(createMarkerIcon(v, v.id === selectedId));
        }
      }
    }

    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

// ── Map init ─────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', {
    center: SEQ_CENTRE,
    zoom: 11,
    zoomControl: true,
  });
  map.on('click', () => {
    if (selectedId) {
      selectedId = null;
      for (const v of vehicles) {
        if (markerObjects[v.id]) markerObjects[v.id].setIcon(createMarkerIcon(v, false));
      }
      document.getElementById('info-panel')?.classList.remove('visible');
      renderTrainList();
    }
  });

  // OpenStreetMap tile layer (works great with dark CSS filter)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> | Data: <a href="https://translink.com.au/about-translink/open-data">Translink CC-BY</a>',
    maxZoom: 19,
  }).addTo(map);

  // Track shapes drawn below train markers — coloured by official Translink line colour
  shapesLayer = L.geoJSON(null, {
    style: function(feature) {
      return {
        color:   feature.properties?.colour || '#336688',
        weight:  3,
        opacity: 0.85,
        lineCap: 'round',
        lineJoin:'round',
      };
    }
  }).addTo(map);

  markersLayer  = L.layerGroup().addTo(map);
  stationsLayer = L.layerGroup().addTo(map);
}

// ── Track shapes ──────────────────────────────────────────────────────────────
async function loadShapes() {
  try {
    const r = await fetch(`${API_BASE}/shapes`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const geojson = await r.json();
    if (!geojson.loaded) {
      // Shapes still being downloaded by backend — retry in 5s
      setTimeout(loadShapes, 5000);
      return;
    }
    shapesLayer.clearLayers();
    shapesLayer.addData(geojson);
    console.log(`Track shapes loaded: ${geojson.segment_count} segments, sample colour: ${geojson.features[0]?.properties?.colour}`);
  } catch(e) {
    console.warn('Failed to load track shapes:', e);
    setTimeout(loadShapes, 10000);
  }
}

// ── Station markers ──────────────────────────────────────────────────────────
async function loadStations() {
  try {
    const r = await fetch(`${API_BASE}/stations`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (!data.stations || data.stations.length === 0) {
      // GTFS not loaded yet — retry
      setTimeout(loadStations, 6000);
      return;
    }
    stationsLayer.clearLayers();
    for (const st of data.stations) {
      const icon = L.divIcon({
        className: '',
        html: `<div style="width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid #4a9eda;box-shadow:0 0 4px rgba(0,0,0,0.6)"></div>`,
        iconSize:   [9, 9],
        iconAnchor: [4, 4],
      });
      const marker = L.marker([st.lat, st.lon], { icon, title: st.stop_name });
      marker.on('click', () => showStationPopup(st));
      stationsLayer.addLayer(marker);
    }
    // Schedule re-fetch to get updated arrivals every 30s
    setTimeout(loadStations, 30000);
  } catch(e) {
    console.warn('Failed to load stations:', e);
    setTimeout(loadStations, 10000);
  }
}

function fmtTime(unixSec) {
  if (!unixSec) return '';
  return new Date(unixSec * 1000).toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit', hour12:false});
}

function minsUntil(unixSec) {
  if (!unixSec) return '';
  const mins = Math.round((unixSec - Date.now()/1000) / 60);
  return mins <= 0 ? 'Now' : `${mins}m`;
}

// Highlight a train on the map by trip_id — pan to it and select it
function highlightTrainByTripId(tripId) {
  const v = vehicles.find(x => x.trip_id === tripId);
  if (!v) {
    // Train not yet in position feed — flash the search box
    showToast(`Train not yet visible on map`);
    return;
  }
  // Close popup and select the train
  map.closePopup();
  selectTrain(v.id);
  map.panTo([v.lat, v.lon], {animate: true, duration: 0.8});
}

function arrivalRow(a) {
  const bc = lineColour(a.route_id);
  const mins = minsUntil(a.arrival_time);
  const time = fmtTime(a.arrival_time);
  const ds = !a.delay ? 'On time' : a.delay > 0
    ? `+${Math.round(a.delay/60)}m late`
    : `${Math.abs(Math.round(a.delay/60))}m early`;
  const delayCol = a.delay > 60 ? '#ff6644' : a.delay < -30 ? '#44aaff' : '#44dd88';
  const minsCol  = mins === 'Now' ? '#ff8844' : '#c8d0dc';
  return `<div onclick="highlightTrainByTripId('${a.trip_id}')"
    style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #2a3040;font-size:11px;cursor:pointer;border-radius:3px"
    onmouseover="this.style.background='#1e2a38'" onmouseout="this.style.background=''">
    <div style="width:32px;height:16px;border-radius:3px;background:${bc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0">${(a.route_id||'').slice(0,3)}</div>
    <div style="flex:1;color:#c8d0dc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.headsign||'—'}</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0">
      <div style="color:${minsCol};font-weight:600;font-size:11px">${mins}</div>
      <div style="color:#4a5a6a;font-size:9px">${time}</div>
      <div style="color:${delayCol};font-size:9px">${ds}</div>
    </div>
  </div>`;
}

function showStationPopup(st) {
  // Flatten all arrivals across platforms, sorted by arrival time
  const arrivals = (st.arrivals || []).slice(0, 8);

  const rows = arrivals.map(a => {
    const bc      = lineColour(a.route_id);
    const arrTime = a.arrival_time;
    const depTime = a.departure_time || a.arrival_time;
    const arrMins = minsUntil(arrTime);
    const depMins = minsUntil(depTime);
    const now     = Date.now() / 1000;

    // Determine if train is arriving, at platform, or departing
    let statusLabel, statusCol, timeLabel;
    if (arrTime > now + 30) {
      statusLabel = 'Arriving';
      statusCol   = '#60a8f0';
      timeLabel   = arrMins;
    } else if (depTime > now) {
      statusLabel = 'At platform';
      statusCol   = '#44dd88';
      timeLabel   = `Dep ${depMins}`;
    } else {
      statusLabel = 'Departing';
      statusCol   = '#f09040';
      timeLabel   = 'Now';
    }

    const ds = !a.delay ? '' : Math.abs(a.delay) < 60 ? '' :
      a.delay > 0 ? `+${Math.round(a.delay/60)}m` : `${Math.round(a.delay/60)}m`;
    const delayCol = a.delay > 60 ? '#ff6644' : a.delay < -60 ? '#44aaff' : '#44dd88';

    const platBadge = a.platform
      ? `<span style="background:#1e3a5a;border:1px solid #2d5a8a;border-radius:2px;padding:0 5px;font-size:8px;font-weight:700;color:#7ab8f5;white-space:nowrap">${a.platform}</span>`
      : '';

    return `<div onclick="highlightTrainByTripId('${a.trip_id}')"
      style="display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #1e2530;cursor:pointer;border-radius:3px"
      onmouseover="this.style.background='#1e2a38'" onmouseout="this.style.background=''">
      <div style="width:30px;height:15px;border-radius:3px;background:${bc};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0">${(a.route_id||'').slice(0,3)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:5px">
          <span style="font-size:11px;color:#c8d0dc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.headsign||'—'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
          <span style="font-size:9px;font-weight:600;color:${statusCol}">${statusLabel}</span>
          ${platBadge}
          ${ds ? `<span style="font-size:9px;color:${delayCol}">${ds}</span>` : ''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;font-weight:700;color:#c8d0dc">${timeLabel}</div>
        <div style="font-size:9px;color:#4a5a6a">${fmtTime(arrTime)}</div>
      </div>
    </div>`;
  }).join('');

  const html = `<div style="min-width:280px;max-width:380px;background:#161a20;border-radius:6px;padding:0;overflow:hidden;font-family:-apple-system,sans-serif">
    <div style="background:#1c2128;padding:8px 12px;border-bottom:1px solid #252d3a">
      <div style="font-weight:600;font-size:13px;color:#fff">🚉 ${st.stop_name}</div>
      <div style="font-size:9px;color:#4a6888;margin-top:2px;text-transform:uppercase;letter-spacing:0.8px">Click a train to track it</div>
    </div>
    <div style="padding:2px 10px 8px;max-height:420px;overflow-y:auto">
      ${rows || '<div style="color:#4a5568;font-size:11px;padding:12px 0;text-align:center">No upcoming trains</div>'}
    </div>
  </div>`;

  L.popup({ maxWidth: 400, className: 'station-popup' })
    .setLatLng([st.lat, st.lon])
    .setContent(html)
    .openOn(map);
}

// ── Data fetching ─────────────────────────────────────────────────────────────
async function fetchVehicles() {
  const r = await fetch(`${API_BASE}/vehicles`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchAlerts() {
  try {
    const r = await fetch(`${API_BASE}/alerts`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  } catch { return { alerts: [] }; }
}

// ── Delay helpers ─────────────────────────────────────────────────────────────
function delayLabel(sec) {
  if (!sec) return 'On Time';
  if (sec > 0) return `+${Math.round(sec/60)}m late`;
  return `${Math.abs(Math.round(sec/60))}m early`;
}

function delayBadgeClass(sec) {
  if (sec > 60)  return 'delay-late';
  if (sec < -30) return 'delay-early';
  return 'delay-on-time';
}

// ── Route colour lookup — populated dynamically from GTFS routes.txt ────────
// Fallback static rules while the live map loads
// Translink actual format: SHBR-4727 (2-letter line + 2-letter dest + trip number)
// Colour rules — handles both prefix-based (SHBR-4727) and 3-letter (BRF, SPR) route_ids
// Route ID format confirmed from GTFS debug/routes API
// Colour lookup — backend sends v.colour for vehicles (authoritative).
// lineColour() is only used as fallback for station popups that have route_id only.
// Map: keywords in GTFS route name → colour
// route_id 4-letter code → hex colour (fallback for station popups lacking v.colour)
// v.colour from backend is the primary source; this is only used for arrival rows
const R='#e3000f',G='#007b40',O='#f5a400',B='#00aeef',P='#7b2d8b';
const ROUTE_COLOUR_TABLE = {
  FGBR:R,BRFG:R,BNFG:R,FGBN:R,BRBR:R,BNBN:R,BNBR:R,BRBN:R,BDBN:R,BNBD:R,
  BDVL:O,VLBD:O,BNVL:O,VLBN:O,BRVL:O,VLBR:O,
  BRAP:O,APBR:O,BNAP:O,APBN:O,BDAP:O,APBD:O,BRBD:O,BDBR:O,DBBR:O,
  BRSH:B,SHBR:B,BNSH:B,SHBN:B,BDSH:B,SHBD:B,
  RPSP:B,SPRP:B,BRSP:B,SPBR:B,BNSP:B,SPBN:B,
  BRDB:P,DBBN:P,BRCL:P,CLBR:P,BNCL:P,CLBN:P,
  BDCA:G,CABD:G,BNCA:G,CABN:G,BRCA:G,CABR:G,BRGY:G,GYBR:G,
  IPCA:G,CAIP:G,IPNA:G,NAIP:G,IPRW:G,RWIP:G,BRRW:G,RWBR:G,RPBR:G,BRRP:G,
};

const _lcCache = {};
const _lcLogged = new Set();

const PFX2={FG:R,BE:R,VL:O,AP:O,SH:B,SP:B,DO:P,CL:P,CA:G,NA:G,GY:G,IP:G,RW:G,RP:G,KP:G,IM:G};
function lineColour(routeId) {
  if (!routeId) return '#888888';
  if (_lcCache[routeId]) return _lcCache[routeId];
  const code = routeId.toUpperCase().split('-')[0];
  const c = ROUTE_COLOUR_TABLE[code] || PFX2[code.slice(0,2)];
  if (!c && !_lcLogged.has(code)) { console.log('Unknown route colour:', routeId); _lcLogged.add(code); }
  return (_lcCache[routeId] = c || '#7a8899');
}

// ── Marker creation (SVG — bearing arrow is rotated inside SVG, no CSS conflicts) ──
// Canvas-based marker — bearing rotation done via ctx.rotate(), completely
// immune to Leaflet's DOM transform interference.
function createMarkerIcon(vehicle, selected) {
  const bearing = (vehicle.bearing || 0) * Math.PI / 180;  // radians
  const colour  = (vehicle.colour || lineColour(vehicle.route_id));
  const size    = selected ? 48 : 40;
  const r       = selected ? 13 : 11;
  const label   = (vehicle.route_id || '').slice(0, 3);
  const stale   = animState[vehicle.id]?.staleRing || false;

  const canvas  = document.createElement('canvas');
  canvas.width  = size;
  canvas.height = size;
  const ctx     = canvas.getContext('2d');
  const cx      = size / 2;
  const cy      = size / 2;

  // ── Arrow (rotated to bearing) ────────────────────────────────────────────
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(bearing);           // 0° = up = north, clockwise positive
  ctx.beginPath();
  const tipY  = -(r + 9);       // tip above centre
  const baseY = -(r - 1);       // base just outside circle edge
  ctx.moveTo(0, tipY);           // tip
  ctx.lineTo(-5, baseY);         // left base
  ctx.lineTo( 5, baseY);         // right base
  ctx.closePath();
  ctx.fillStyle = colour;
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  // ── Circle body ───────────────────────────────────────────────────────────
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = colour;
  ctx.fill();

  // Circle border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = selected ? '#fbbf24' : stale ? '#ff3333' : 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = selected ? 3 : stale ? 2.5 : 1.5;
  ctx.stroke();

  // Selected glow ring
  if (selected) {
    ctx.beginPath();
    ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(251,191,36,0.4)';
    ctx.lineWidth   = 3;
    ctx.stroke();
  }

  // Stale ring — red pulsing ring outside the circle
  if (stale && !selected) {
    ctx.beginPath();
    ctx.arc(cx, cy, r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,50,50,0.85)';
    ctx.lineWidth   = 2;
    ctx.stroke();
  }

  // ── Route label text ──────────────────────────────────────────────────────
  ctx.fillStyle    = 'white';
  ctx.font         = `bold ${selected ? 9 : 8}px -apple-system, sans-serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy + 1);

  // Convert canvas to data URL for Leaflet divIcon
  const dataUrl = canvas.toDataURL();
  const html    = `<img src="${dataUrl}" width="${size}" height="${size}" style="display:block">`;

  return L.divIcon({
    className:   '',
    html,
    iconSize:    [size, size],
    iconAnchor:  [size/2, size/2],
    popupAnchor: [0, -(size/2 + 4)],
  });
}

// ── Map update ────────────────────────────────────────────────────────────────
function updateMap(data) {
  const pollTs = Date.now() / 1000;
  vehicles = (data.vehicles || []).map(v => ({...v, _pollTime: pollTs}));
  const existingIds = new Set(Object.keys(markerObjects));
  const newIds      = new Set(vehicles.map(v => v.id));

  // Remove stale markers and animation state
  for (const id of existingIds) {
    if (!newIds.has(id)) {
      markersLayer.removeLayer(markerObjects[id]);
      delete markerObjects[id];
      delete animState[id];
    }
  }

  for (const v of vehicles) {
    const isSelected = v.id === selectedId;

    // Initialise animState on first sight — marker appears at real GPS immediately
    if (!animState[v.id]) {
      animState[v.id] = {
        lat: v.lat, lon: v.lon,
        fromLat: v.lat, fromLon: v.lon,
        toLat: v.lat, toLon: v.lon,
        progress: 1,
        stoppedAt: null, staleRing: false, stationaryPolls: 0,
        lastGPS: {lat: v.lat, lon: v.lon}, lastPollTime: 0,
      };
    }

    // Update the GPS target so the animation loop can interpolate toward it
    const s = animState[v.id];

    if (markerObjects[v.id]) {
      markerObjects[v.id].setIcon(createMarkerIcon(v, isSelected));
    } else {
      const marker = L.marker([s.lat, s.lon], {
        icon: createMarkerIcon(v, isSelected),
        title: `${v.route_id} – ${v.label}`,
      });
      marker.on('click', () => selectTrain(v.id));
      marker.bindTooltip(buildTooltip(v), {
        direction: 'top',
        offset: [0, -10],
        className: 'train-tooltip',
      });
      marker.addTo(markersLayer);
      markerObjects[v.id] = marker;
    }

    markerObjects[v.id].setTooltipContent(buildTooltip(v));
    if (showLabels) markerObjects[v.id].openTooltip();
  }

  // Ensure smooth animation loop is running
  startAnimLoop();
}

function buildTooltip(v) {
  const delay = delayLabel(v.delay_seconds);
  const speed = v.speed ? `${v.speed} km/h` : '—';
  const dest  = v.headsign ? `<br/>→ <span style="color:#93c5fd">${v.headsign}</span>` : '';
  const stop  = v.current_stop_name
    ? `<br/><span style="color:#7a9ab8;font-size:11px">${statusVerb(v.current_status)} ${v.current_stop_name}</span>`
    : '';
  return `<div style="background:#0d1b2a;border:1px solid #1e3a5a;border-radius:6px;padding:6px 10px;font-size:12px;color:#e0e6f0;max-width:220px">
    <b style="color:#e63946">${v.route_id}</b> &nbsp; ${v.label}${dest}${stop}<br/>
    <span style="color:#7a9ab8">${delay} &nbsp;·&nbsp; ${speed}</span>
  </div>`;
}

function statusVerb(status) {
  if (status === 'STOPPED_AT')        return 'At';
  if (status === 'IN_TRANSIT_TO')     return 'To';
  if (status === 'INCOMING_AT')       return 'Arriving';
  return '';
}

// ── Sidebar train list ────────────────────────────────────────────────────────
function renderTrainList() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const filtered = vehicles.filter(v =>
    !query ||
    (v.route_id || '').toLowerCase().includes(query) ||
    (v.id || '').toLowerCase().includes(query) ||
    (v.headsign || '').toLowerCase().includes(query) ||
    (v.line_name || '').toLowerCase().includes(query)
  );

  const list = document.getElementById('train-list');

  if (!filtered.length) {
    list.innerHTML = `<div class="no-data">${vehicles.length ? 'No trains match your search.' : 'No active trains found.'}</div>`;
    return;
  }

  // Sort by route then delay severity
  filtered.sort((a, b) => {
    if (a.route_id < b.route_id) return -1;
    if (a.route_id > b.route_id) return 1;
    return (b.delay_seconds || 0) - (a.delay_seconds || 0);
  });

  list.innerHTML = filtered.map(v => {
    const col = (v.colour || lineColour(v.route_id));
    const stale = animState[v.id]?.staleRing || false;
    const rawDest = (v.headsign || '')
      .replace(/,?\s*[Pp]latform\s*\d+\s*$/, '')
      .replace(/\s+[Ss]tation\s*$/i, '')
      .trim();
    // Trip codes look like: 1M41, DGN8, DM37, 1GN0 — alphanumeric ≤6 chars, no spaces
    const headsignIsCode = rawDest.length <= 6 && /^[0-9A-Z]+$/i.test(rawDest);
    const dest = headsignIsCode || !rawDest
      ? (v.line_name || v.label || rawDest || '—')
      : rawDest;
    const ns = v.next_stops && v.next_stops.length ? v.next_stops[0] : null;
    const nsName = ns
      ? (ns.stop_name || ns.stop_id || '')
          .replace(/,\s*[Pp]latform\s*\d+\s*$/, '')
          .replace(/\s+[Ss]tation\s*$/i, '')
      : null;
    const nsTime = ns ? (ns.arrival_time || 0) + (ns.arrival_delay || 0) : 0;
    const nsMins = nsTime ? Math.round((nsTime - Date.now() / 1000) / 60) : null;
    const nsLabel = nsMins !== null ? (nsMins <= 0 ? 'Now' : `${nsMins}m`) : '';
    const delayTxt = delayLabel(v.delay_seconds);
    const delayClass = delayBadgeClass(v.delay_seconds);
    const curStop = v.current_stop_name
      ? v.current_stop_name.replace(/,\s*[Pp]latform\s*\d+\s*$/, '').replace(/\s+[Ss]tation\s*$/i, '').slice(0, 18)
      : '';
    return `<div class="train-card ${v.id === selectedId ? 'selected' : ''}" onclick="selectTrain('${v.id}')" style="${stale ? 'border-color:#cc2222;' : ''}">
      <div style="display:flex;align-items:center;gap:6px">
        <div style="background:${col};border-radius:3px;padding:2px 7px;flex-shrink:0;min-width:0">
          <div style="font-weight:700;font-size:0.72rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px">${dest}</div>
        </div>
        <span class="delay-badge ${delayClass}" style="margin-left:auto;flex-shrink:0">${delayTxt}</span>
        ${stale ? `<span style="font-size:0.6rem;color:#ff4444;font-weight:700;flex-shrink:0" title="Stopped >2 min">⬤</span>` : ''}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">
        <span style="font-size:0.65rem;color:#5a7898;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nsName ? '→ ' + nsName : curStop ? statusVerb(v.current_status)+' '+curStop : ''}</span>
        ${nsLabel ? `<span style="font-size:0.65rem;font-weight:600;color:#8ab0d0;flex-shrink:0;margin-left:4px">${nsLabel}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Select / focus a train ────────────────────────────────────────────────────
function selectTrain(id) {
  selectedId = (selectedId === id) ? null : id;

  // Refresh marker icons
  for (const v of vehicles) {
    if (markerObjects[v.id]) {
      markerObjects[v.id].setIcon(createMarkerIcon(v, v.id === selectedId));
    }
  }

  renderTrainList();

  if (!selectedId) {
    closeInfoPanel();
    return;
  }

  const v = vehicles.find(x => x.id === selectedId);
  if (!v) return;

  // Pan to train
  map.panTo([v.lat, v.lon], { animate: true });

  // Show info panel
  showInfoPanel(v);
}

function bearingCompass(deg) {
  if (deg === null || deg === undefined) return '—';
  const dirs = ['N','NE','E','SE','S','SW','W','NW','N'];
  return dirs[Math.round(deg / 45) % 8] + ` (${Math.round(deg)}°)`;
}

function showInfoPanel(v) {
  const panel   = document.getElementById('info-panel');
  const titleEl = document.getElementById('info-title');
  const content = document.getElementById('info-content');

  const dest = v.headsign || '—';
  titleEl.innerHTML = `🚆 <span style="color:#e63946">${v.route_id}</span> → ${dest}`;

  // Current station line
  let statusLine = '—';
  if (v.current_stop_name) {
    statusLine = `${statusVerb(v.current_status)} <strong>${v.current_stop_name}</strong>`;
  } else if (v.current_status) {
    statusLine = v.current_status.replace(/_/g, ' ');
  }

  const rows = [
    ['Status',    statusLine],
    ['Delay',     delayLabel(v.delay_seconds)],
    ['Speed',     v.speed ? `${v.speed} km/h` : '—'],
    ['Heading',   bearingCompass(v.bearing)],
    ['Train',     v.label],
    ['Trip ID',   v.trip_id || '—'],
  ];

  content.innerHTML = rows.map(([label, value]) => `
    <div class="info-row">
      <span class="label">${label}</span>
      <span class="value">${value}</span>
    </div>`).join('');

  // Next stops with names
  if (v.next_stops && v.next_stops.length) {
    content.innerHTML += `<div style="font-size:0.72rem;color:#7a9ab8;margin-top:8px;margin-bottom:4px">Next Stops</div>`;
    const trainDelay = v.delay_seconds || 0;
    content.innerHTML += v.next_stops.slice(0, 4).map(s => {
      const raw  = s.stop_name || s.stop_id;
      // Strip platform suffix: ", platform X", ", Platform X", " platform X"
      const name = raw.replace(/,?\s*[Pp]latform\s*\d+/g, '').trim();
      const d    = s.arrival_delay;
      // Only show delay if it differs meaningfully from the train's overall delay
      let delayStr = '';
      if (d !== null && d !== undefined) {
        const diffFromOverall = d - trainDelay;
        if (Math.abs(d) < 60) {
          delayStr = 'On time';
        } else if (Math.abs(diffFromOverall) >= 60) {
          // This stop has a notably different delay — show it
          delayStr = d > 0 ? `+${Math.round(d/60)}m` : `${Math.round(d/60)}m`;
        }
        // Otherwise leave blank — delay shown in header already
      }
      const delayCol = !delayStr || delayStr==='On time' ? '#7a9ab8'
                     : d > 60 ? '#fca5a5' : '#93c5fd';
      return `<div class="info-row">
        <span class="label" style="max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${raw}">${name}</span>
        <span class="value" style="color:${delayCol}">${delayStr}</span>
      </div>`;
    }).join('');
  }

  panel.classList.add('visible');
}

function closeInfoPanel() {
  selectedId = null;
  document.getElementById('info-panel').classList.remove('visible');
  for (const v of vehicles) {
    if (markerObjects[v.id]) markerObjects[v.id].setIcon(createMarkerIcon(v, false));
  }
  renderTrainList();
}

// ── Alerts ───────────────────────────────────────────────────────────────────
function renderAlerts(alertData) {
  const list   = document.getElementById('alerts-list');
  const alerts = alertData.alerts || [];
  const tab    = document.querySelector('.sidebar-tabs .tab:nth-child(2)');

  if (!alerts.length) {
    list.innerHTML = `<div class="no-data">✅ No active service alerts.</div>`;
    tab.textContent = '⚠️ Alerts';
    return;
  }

  tab.textContent = `⚠️ Alerts (${alerts.length})`;

  list.innerHTML = alerts.map(a => `
    <div class="alert-card">
      <div class="alert-header">${a.header || 'Service Alert'}</div>
      <div class="alert-desc">${a.description || ''}</div>
      <div class="alert-tags">
        <span class="alert-tag">${a.effect}</span>
        <span class="alert-tag">${a.cause}</span>
        ${a.routes.slice(0,3).map(r => `<span class="alert-tag">${r}</span>`).join('')}
      </div>
    </div>`).join('');
}

// ── Header update ─────────────────────────────────────────────────────────────
function updateHeader(data) {
  const pill       = document.getElementById('status-pill');
  const countEl    = document.getElementById('vehicle-count');
  const updatedEl  = document.getElementById('last-updated');

  countEl.textContent = data.count || 0;

  if (data.error) {
    pill.className = 'stat-pill error';
    updatedEl.textContent = `Error: ${data.error}`;
  } else {
    const age = data.last_updated ? Math.round(Date.now()/1000 - data.last_updated) : null;
    pill.className = (age && age > 60) ? 'stat-pill stale' : 'stat-pill';
    updatedEl.textContent = age ? `Updated ${age}s ago` : 'Live';
  }
}

// ── Main refresh ──────────────────────────────────────────────────────────────
async function refresh() {
  try {
    const [vehicleData, alertData] = await Promise.all([fetchVehicles(), fetchAlerts()]);
    updateMap(vehicleData);
    updateHeader(vehicleData);
    renderTrainList();
    renderAlerts(alertData);

    // Update info panel if open
    if (selectedId) {
      const v = vehicles.find(x => x.id === selectedId);
      if (v) showInfoPanel(v);
    }
  } catch(e) {
    document.getElementById('last-updated').textContent = 'Connection error';
    document.getElementById('status-pill').className = 'stat-pill error';
    showToast(`⚠️ ${e.message}`);
  }
}

// ── Controls ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', (i === 0 && name === 'trains') || (i === 1 && name === 'alerts')));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('toggle-labels-btn').classList.toggle('active', showLabels);
  for (const v of vehicles) {
    const m = markerObjects[v.id];
    if (!m) continue;
    if (showLabels) m.openTooltip(); else m.closeTooltip();
  }
}

function toggleAutoRefresh() {
  autoRefresh = !autoRefresh;
  const btn = document.getElementById('auto-refresh-btn');
  btn.classList.toggle('active', autoRefresh);
  btn.textContent = autoRefresh ? 'Live ●' : 'Paused ◼';
  if (autoRefresh) scheduleRefresh();
  else if (refreshTimer) { clearTimeout(refreshTimer); refreshTimer = null; }
  showToast(autoRefresh ? '▶ Live tracking resumed' : '⏸ Tracking paused');
}

function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  if (!autoRefresh) return;
  refreshTimer = setTimeout(async () => {
    await refresh();
    scheduleRefresh();
  }, REFRESH_MS);
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  initMap();
  // colours come from v.colour on each vehicle (set by backend)
  loadShapes();       // fetch track shapes from GTFS (runs in background)
  loadStations();     // fetch station markers with arrivals

  const loading = document.getElementById('loading');

  // Initial load with retry
  let attempts = 0;
  while (attempts < 5) {
    try {
      await refresh();
      break;
    } catch(e) {
      attempts++;
      if (attempts < 5) {
        document.querySelector('.loader-text').textContent = `Retrying… (attempt ${attempts+1}/5)`;
        await new Promise(r => setTimeout(r, 2000));
      }
    }
  }

  loading.classList.add('fade');
  setTimeout(() => loading.remove(), 500);

  scheduleRefresh();
})();


// ── Sidebar toggle ────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.querySelector('.sidebar');
  const btn = document.getElementById('sidebar-toggle');
  const collapsed = sb.classList.toggle('collapsed');
  btn.textContent = collapsed ? '▶' : '☰';
  btn.title = collapsed ? 'Open sidebar' : 'Close sidebar';
  // Trigger map resize after transition
  setTimeout(() => { if (map) map.invalidateSize(); }, 260);
}

// Start collapsed on narrow screens
if (window.innerWidth < 768) {
  document.querySelector('.sidebar').classList.add('collapsed');
  const btn = document.getElementById('sidebar-toggle');
  if (btn) { btn.textContent = '▶'; btn.title = 'Open sidebar'; }
}

</script>
