<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QLD Train Tracker — Backend Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; color: #c0d0c0; font-family: 'Courier New', monospace; font-size: 13px; }
    header {
      background: #0d1b2a; border-bottom: 1px solid #1e3a5a;
      padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 1rem; color: #fff; }
    header a { color: #7a9ab8; font-size: 0.8rem; text-decoration: none; margin-left: auto; }
    header a:hover { color: #e0e6f0; }
    .controls {
      padding: 10px 16px; background: #0d1b2a; border-bottom: 1px solid #1e3a5a;
      display: flex; gap: 10px; align-items: center;
    }
    .btn {
      background: #1e3a5a; border: 1px solid #2d5a8a; border-radius: 5px;
      color: #e0e6f0; padding: 5px 14px; cursor: pointer; font-size: 0.78rem;
    }
    .btn:hover { background: #2d5a8a; }
    .btn.active { background: #e63946; border-color: #e63946; }
    #status { font-size: 0.75rem; color: #7a9ab8; margin-left: auto; }
    #log-container {
      padding: 12px 16px; height: calc(100vh - 90px); overflow-y: auto;
      white-space: pre-wrap; word-break: break-all; line-height: 1.6;
    }
    .line-INFO    { color: #a0c0a0; }
    .line-DEBUG   { color: #506070; }
    .line-WARNING { color: #c0a030; }
    .line-ERROR   { color: #e05050; font-weight: bold; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1e3a5a; border-radius: 3px; }
  </style>
</head>
<body>
<header>
  <h1>🚆 Backend Logs</h1>
  <a href="/">← Back to map</a>
</header>
<div class="controls">
  <button class="btn" onclick="fetchLogs()">↻ Refresh</button>
  <button class="btn active" id="auto-btn" onclick="toggleAuto()">Auto-refresh: ON</button>
  <button class="btn" onclick="scrollBottom()">↓ Bottom</button>
  <span id="status">Loading…</span>
</div>
<div id="log-container">Loading logs…</div>

<script>
  let autoTimer = null;
  let autoOn = true;

  function levelClass(line) {
    if (line.includes('[ERROR]'))   return 'line-ERROR';
    if (line.includes('[WARNING]')) return 'line-WARNING';
    if (line.includes('[DEBUG]'))   return 'line-DEBUG';
    return 'line-INFO';
  }

  async function fetchLogs() {
    try {
      const r = await fetch('/api/logs');
      const d = await r.json();
      if (d.error) {
        document.getElementById('log-container').textContent = 'Error: ' + d.error;
        return;
      }
      const container = document.getElementById('log-container');
      const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 40;
      container.innerHTML = d.lines
        .map(l => `<span class="${levelClass(l)}">${l.replace(/</g,'&lt;')}</span>`)
        .join('');
      document.getElementById('status').textContent =
        `${d.total_lines} total lines · last ${d.lines.length} shown · ${new Date().toLocaleTimeString()}`;
      if (atBottom) scrollBottom();
    } catch(e) {
      document.getElementById('status').textContent = 'Fetch error: ' + e.message;
    }
  }

  function scrollBottom() {
    const c = document.getElementById('log-container');
    c.scrollTop = c.scrollHeight;
  }

  function toggleAuto() {
    autoOn = !autoOn;
    const btn = document.getElementById('auto-btn');
    btn.textContent = `Auto-refresh: ${autoOn ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', autoOn);
    if (autoOn) scheduleAuto(); else { clearTimeout(autoTimer); autoTimer = null; }
  }

  function scheduleAuto() {
    if (autoTimer) clearTimeout(autoTimer);
    if (!autoOn) return;
    autoTimer = setTimeout(async () => { await fetchLogs(); scheduleAuto(); }, 3000);
  }

  fetchLogs().then(() => { scrollBottom(); scheduleAuto(); });
</script>
</body>
</html>
