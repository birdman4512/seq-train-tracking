server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API proxy — handles both /api/ (root) and /prefix/api/ (subfolder)
    # The regex captures everything after /api/ and proxies to backend
    location ~ /api/(.*)$ {
        proxy_pass         http://backend:5000/api/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
